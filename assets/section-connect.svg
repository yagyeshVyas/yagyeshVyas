<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 56" width="900" height="56" role="img" aria-label="WORK WITH ME">
  <style>@media (prefers-reduced-motion: reduce) {
  animate, animateTransform { display: none !important; }
  * { opacity: 1 !important; }
}</style>
  <defs>
    <linearGradient id="sw" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <text x="18" y="36" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="18" font-weight="700" fill="#34d399">&#9656;</text>
  <text x="40" y="36" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="16" font-weight="700" fill="#e2e8f0" letter-spacing="5">WORK WITH ME</text>
  <rect x="214" y="24" width="10" height="15" fill="#34d399">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
  <text x="882" y="36" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#475569" text-anchor="end">// let’s build something</text>
  <line x1="18" y1="48" x2="882" y2="48" stroke="#1b2340" stroke-width="1"/>
  <rect x="18" y="47" width="220" height="2" rx="1" fill="url(#sw)">
    <animateTransform attributeName="transform" type="translate" values="-220,0; 900,0" dur="4.5s" repeatCount="indefinite"/>
  </rect>
</svg>