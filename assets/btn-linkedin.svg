<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" width="280" height="120" role="img" aria-label="LinkedIn">
  <defs>
    <linearGradient id="liG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#0a66c2"/>
    </linearGradient>
    <filter id="liF" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="liShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="liClip"><rect width="280" height="120" rx="12"/></clipPath>
  </defs>
  <style>@media (prefers-reduced-motion: reduce){animate{display:none!important}*{opacity:1!important}}</style>
  <rect width="280" height="120" rx="12" fill="#0b1224" stroke="#1b2340" stroke-width="1"/>
  <rect x="0" y="0" width="280" height="3" rx="1.5" fill="url(#liG)"/>
  <g transform="translate(20,20)" filter="url(#liF)">
    <circle cx="20" cy="20" r="18" fill="#0b0f1e" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="20" y="27" font-family="Segoe UI,Inter,sans-serif" font-size="18" font-weight="800" fill="#22d3ee" text-anchor="middle">in</text>
  </g>
  <text x="66" y="36" font-family="Segoe UI,Inter,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">LinkedIn</text>
  <text x="66" y="54" font-family="JetBrains Mono,monospace" font-size="11" fill="#64748b">/in/yagyeshvyas</text>
  <line x1="20" y1="66" x2="260" y2="66" stroke="#1b2340" stroke-width="0.8"/>
  <text x="20" y="86" font-family="Segoe UI,Inter,sans-serif" font-size="11" fill="#94a3b8">AI/ML Engineer</text>
  <text x="250" y="86" font-family="JetBrains Mono,monospace" font-size="14" fill="#22d3ee" text-anchor="end">→
    <animateTransform attributeName="transform" type="translate" values="0,0; 5,0; 0,0" dur="1.6s" begin="0.5s" repeatCount="indefinite"/>
  </text>
  <g clip-path="url(#liClip)">
    <rect x="-80" y="0" width="70" height="120" fill="url(#liShine)" transform="skewX(-18)">
      <animate attributeName="x" values="-80;340" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect width="280" height="120" rx="12" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0;0.4;0" dur="4s" begin="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
