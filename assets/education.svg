<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="100%" height="auto" role="img" aria-label="Education and certifications">
  <defs>
    <linearGradient id="edBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1e"/><stop offset="100%" stop-color="#0b1224"/>
    </linearGradient>
    <linearGradient id="edLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="edFrame"><rect width="900" height="200" rx="14"/></clipPath>
  </defs>
  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform { display: none !important; }
      * { opacity: 1 !important; }
    }
    .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
    .sans { font-family: "Segoe UI", Inter, ui-sans-serif, system-ui, sans-serif; }
  </style>

  <g clip-path="url(#edFrame)">
    <rect width="900" height="200" fill="url(#edBg)"/>
    <rect width="900" height="200" rx="14" fill="none" stroke="#1b2340" stroke-width="1.5"/>

    <!-- Header -->
    <text x="24" y="36" class="mono" font-size="13" fill="#a78bfa" font-weight="600" letter-spacing="2">EDUCATION &amp; CERTIFICATIONS</text>
    <rect x="24" y="46" width="852" height="1" fill="#1b2340"/>

    <!-- ============ LEFT: Education ============ -->
    <g transform="translate(24,58)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.2s" fill="freeze"/>
      <text x="0" y="14" class="mono" font-size="10" fill="#a78bfa" font-weight="600" letter-spacing="1">EDUCATION</text>

      <!-- MS -->
      <g transform="translate(0,28)">
        <text x="0" y="14" class="sans" font-size="14" font-weight="700" fill="#e2e8f0">M.S. Computer Science &amp; IT</text>
        <text x="0" y="32" class="sans" font-size="11" fill="#64748b">University of the Potomac · Richmond, VA</text>
        <text x="0" y="48" class="mono" font-size="10" fill="#34d399">GPA: 3.88/4.0 · Jun 2024 – Aug 2026</text>
      </g>

      <!-- BE -->
      <g transform="translate(0,86)">
        <text x="0" y="14" class="sans" font-size="14" font-weight="700" fill="#e2e8f0">B.E. Computer Science</text>
        <text x="0" y="32" class="sans" font-size="11" fill="#64748b">Gujarat Technological University (GTU)</text>
        <text x="0" y="48" class="mono" font-size="10" fill="#64748b">GPA: 8.08/10 · May 2019 – May 2022</text>
      </g>
    </g>

    <!-- Divider -->
    <line x1="440" y1="58" x2="440" y2="180" stroke="#1b2340" stroke-width="1"/>

    <!-- ============ RIGHT: Certifications ============ -->
    <g transform="translate(460,58)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.4s" fill="freeze"/>
      <text x="0" y="14" class="mono" font-size="10" fill="#fbbf24" font-weight="600" letter-spacing="1">CERTIFICATIONS</text>

      <g class="sans" font-size="12" fill="#94a3b8">
        <g transform="translate(0,28)">
          <rect width="180" height="24" rx="6" fill="#0b0f1e" stroke="#1b2340" stroke-width="0.8"/>
          <text x="10" y="16" fill="#fbbf24" font-size="10">🏆</text>
          <text x="26" y="16">AWS AI &amp; ML Fundamentals</text>
        </g>
        <g transform="translate(190,28)">
          <rect width="200" height="24" rx="6" fill="#0b0f1e" stroke="#1b2340" stroke-width="0.8"/>
          <text x="10" y="16" fill="#fbbf24" font-size="10">🏆</text>
          <text x="26" y="16">Kubernetes Cloud Native</text>
        </g>
        <g transform="translate(0,58)">
          <rect width="220" height="24" rx="6" fill="#0b0f1e" stroke="#1b2340" stroke-width="0.8"/>
          <text x="10" y="16" fill="#fbbf24" font-size="10">🏆</text>
          <text x="26" y="16">IBM AI Applications (Mar 2026)</text>
        </g>
        <g transform="translate(230,58)">
          <rect width="210" height="24" rx="6" fill="#0b0f1e" stroke="#1b2340" stroke-width="0.8"/>
          <text x="10" y="16" fill="#fbbf24" font-size="10">🏆</text>
          <text x="26" y="16">IBM NLP (Feb 2026)</text>
        </g>
        <g transform="translate(0,88)">
          <rect width="200" height="24" rx="6" fill="#0b0f1e" stroke="#1b2340" stroke-width="0.8"/>
          <text x="10" y="16" fill="#fbbf24" font-size="10">🏆</text>
          <text x="26" y="16">GenAI Fundamentals</text>
        </g>
        <g transform="translate(210,88)">
          <rect width="180" height="24" rx="6" fill="#0b0f1e" stroke="#1b2340" stroke-width="0.8"/>
          <text x="10" y="16" fill="#fbbf24" font-size="10">🏆</text>
          <text x="26" y="16">Information Security</text>
        </g>
      </g>
    </g>

    <rect x="24" y="190" width="852" height="2" rx="1" fill="url(#edLine)" opacity="0.2"/>
  </g>
</svg>
