<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="100%" height="auto" role="img" aria-label="Technical skills">
  <defs>
    <linearGradient id="skBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1e"/><stop offset="100%" stop-color="#0b1224"/>
    </linearGradient>
    <linearGradient id="skLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="skFrame"><rect width="900" height="520" rx="14"/></clipPath>
  </defs>
  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform { display: none !important; }
      * { opacity: 1 !important; }
    }
    .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
    .sans { font-family: "Segoe UI", Inter, ui-sans-serif, system-ui, sans-serif; }
  </style>

  <g clip-path="url(#skFrame)">
    <rect width="900" height="520" fill="url(#skBg)"/>
    <rect width="900" height="520" rx="14" fill="none" stroke="#1b2340" stroke-width="1.5"/>

    <!-- Header -->
    <text x="24" y="36" class="mono" font-size="13" fill="#f472b6" font-weight="600" letter-spacing="2">TECHNICAL SKILLS</text>
    <text x="170" y="36" class="mono" font-size="10" fill="#475569">// from my resume — what I actually work with daily</text>
    <rect x="24" y="46" width="852" height="1" fill="#1b2340"/>

    <!-- ============ Row 1: AI/ML + Languages ============ -->

    <!-- AI / ML -->
    <g transform="translate(24,60)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.1s" fill="freeze"/>
      <rect width="420" height="200" rx="10" fill="#0b1224" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3"/>
      <rect x="0" y="0" width="420" height="3" rx="1.5" fill="#22d3ee"/>
      <text x="20" y="30" class="mono" font-size="11" fill="#22d3ee" font-weight="600" letter-spacing="1">AI / ML</text>
      <line x1="20" y1="38" x2="400" y2="38" stroke="#1b2340"/>

      <g class="sans" font-size="12" fill="#94a3b8">
        <text x="20" y="60"><tspan fill="#22d3ee">●</tspan>  LLMs &amp; Generative AI</text>
        <text x="220" y="60"><tspan fill="#22d3ee">●</tspan>  RAG Pipelines</text>
        <text x="20" y="82"><tspan fill="#22d3ee">●</tspan>  LangChain</text>
        <text x="220" y="82"><tspan fill="#22d3ee">●</tspan>  Prompt Engineering</text>
        <text x="20" y="104"><tspan fill="#22d3ee">●</tspan>  Fine-Tuning (LoRA, Unsloth)</text>
        <text x="220" y="104"><tspan fill="#22d3ee">●</tspan>  Vector DBs (ChromaDB)</text>
        <text x="20" y="126"><tspan fill="#22d3ee">●</tspan>  GGUF / Quantization</text>
        <text x="220" y="126"><tspan fill="#22d3ee">●</tspan>  Ollama</text>
        <text x="20" y="148"><tspan fill="#22d3ee">●</tspan>  LM Studio</text>
      </g>
      <!-- animated pulse -->
      <circle cx="400" cy="180" r="4" fill="#22d3ee">
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Languages -->
    <g transform="translate(456,60)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.2s" fill="freeze"/>
      <rect width="420" height="200" rx="10" fill="#0b1224" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.3"/>
      <rect x="0" y="0" width="420" height="3" rx="1.5" fill="#a78bfa"/>
      <text x="20" y="30" class="mono" font-size="11" fill="#a78bfa" font-weight="600" letter-spacing="1">LANGUAGES</text>
      <line x1="20" y1="38" x2="400" y2="38" stroke="#1b2340"/>

      <!-- Language pills with proficiency bars -->
      <g transform="translate(20,56)">
        <!-- Python -->
        <text x="0" y="14" class="sans" font-size="13" fill="#e2e8f0" font-weight="600">Python</text>
        <rect x="0" y="20" width="180" height="5" rx="2.5" fill="#1b2340"/>
        <rect x="0" y="20" width="0" height="5" rx="2.5" fill="#a78bfa">
          <animate attributeName="width" values="0;170" dur="1s" begin="0.4s" fill="freeze"/>
        </rect>
        <text x="190" y="25" class="mono" font-size="9" fill="#64748b">primary</text>

        <!-- SQL -->
        <text x="0" y="48" class="sans" font-size="13" fill="#e2e8f0" font-weight="600">SQL</text>
        <rect x="0" y="54" width="180" height="5" rx="2.5" fill="#1b2340"/>
        <rect x="0" y="54" width="0" height="5" rx="2.5" fill="#a78bfa">
          <animate attributeName="width" values="0;140" dur="1s" begin="0.5s" fill="freeze"/>
        </rect>
        <text x="190" y="59" class="mono" font-size="9" fill="#64748b">proficient</text>

        <!-- JavaScript -->
        <text x="0" y="82" class="sans" font-size="13" fill="#e2e8f0" font-weight="600">JavaScript</text>
        <rect x="0" y="88" width="180" height="5" rx="2.5" fill="#1b2340"/>
        <rect x="0" y="88" width="0" height="5" rx="2.5" fill="#a78bfa">
          <animate attributeName="width" values="0;120" dur="1s" begin="0.6s" fill="freeze"/>
        </rect>
        <text x="190" y="93" class="mono" font-size="9" fill="#64748b">working</text>

        <!-- Bash -->
        <text x="0" y="116" class="sans" font-size="13" fill="#e2e8f0" font-weight="600">Bash</text>
        <rect x="0" y="122" width="180" height="5" rx="2.5" fill="#1b2340"/>
        <rect x="0" y="122" width="0" height="5" rx="2.5" fill="#a78bfa">
          <animate attributeName="width" values="0;90" dur="1s" begin="0.7s" fill="freeze"/>
        </rect>
        <text x="190" y="127" class="mono" font-size="9" fill="#64748b">scripting</text>
      </g>
    </g>

    <!-- ============ Row 2: Cloud + Data & BI ============ -->

    <!-- Cloud & Infra -->
    <g transform="translate(24,272)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.3s" fill="freeze"/>
      <rect width="420" height="120" rx="10" fill="#0b1224" stroke="#f472b6" stroke-width="1" stroke-opacity="0.3"/>
      <rect x="0" y="0" width="420" height="3" rx="1.5" fill="#f472b6"/>
      <text x="20" y="30" class="mono" font-size="11" fill="#f472b6" font-weight="600" letter-spacing="1">CLOUD &amp; INFRA</text>
      <line x1="20" y1="38" x2="400" y2="38" stroke="#1b2340"/>

      <g class="sans" font-size="12" fill="#94a3b8">
        <text x="20" y="60"><tspan fill="#f472b6">●</tspan>  AWS (ML/AI Fundamentals)</text>
        <text x="220" y="60"><tspan fill="#f472b6">●</tspan>  Kubernetes</text>
        <text x="20" y="82"><tspan fill="#f472b6">●</tspan>  Docker</text>
        <text x="220" y="82"><tspan fill="#f472b6">●</tspan>  REST APIs</text>
        <text x="20" y="104"><tspan fill="#f472b6">●</tspan>  n8n Automation</text>
      </g>
    </g>

    <!-- Data & BI -->
    <g transform="translate(456,272)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.4s" fill="freeze"/>
      <rect width="420" height="120" rx="10" fill="#0b1224" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.3"/>
      <rect x="0" y="0" width="420" height="3" rx="1.5" fill="#fbbf24"/>
      <text x="20" y="30" class="mono" font-size="11" fill="#fbbf24" font-weight="600" letter-spacing="1">DATA &amp; BI</text>
      <line x1="20" y1="38" x2="400" y2="38" stroke="#1b2340"/>

      <g class="sans" font-size="12" fill="#94a3b8">
        <text x="20" y="60"><tspan fill="#fbbf24">●</tspan>  Power BI</text>
        <text x="220" y="60"><tspan fill="#fbbf24">●</tspan>  Streamlit</text>
        <text x="20" y="82"><tspan fill="#fbbf24">●</tspan>  Pandas</text>
        <text x="220" y="82"><tspan fill="#fbbf24">●</tspan>  Excel</text>
        <text x="20" y="104"><tspan fill="#fbbf24">●</tspan>  Google Sheets</text>
      </g>
    </g>

    <!-- ============ Row 3: Frameworks + AI APIs ============ -->

    <!-- Frameworks -->
    <g transform="translate(24,404)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
      <rect width="420" height="100" rx="10" fill="#0b1224" stroke="#34d399" stroke-width="1" stroke-opacity="0.3"/>
      <rect x="0" y="0" width="420" height="3" rx="1.5" fill="#34d399"/>
      <text x="20" y="28" class="mono" font-size="11" fill="#34d399" font-weight="600" letter-spacing="1">FRAMEWORKS</text>
      <line x1="20" y1="36" x2="400" y2="36" stroke="#1b2340"/>

      <g class="sans" font-size="11.5" fill="#94a3b8">
        <text x="20" y="56"><tspan fill="#34d399">●</tspan>  Flask</text>
        <text x="120" y="56"><tspan fill="#34d399">●</tspan>  Playwright</text>
        <text x="240" y="56"><tspan fill="#34d399">●</tspan>  BeautifulSoup</text>
        <text x="20" y="78"><tspan fill="#34d399">●</tspan>  OpenPyXL</text>
        <text x="120" y="78"><tspan fill="#34d399">●</tspan>  asyncio</text>
        <text x="240" y="78"><tspan fill="#34d399">●</tspan>  SQLite</text>
      </g>
    </g>

    <!-- AI APIs -->
    <g transform="translate(456,404)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.6s" fill="freeze"/>
      <rect width="420" height="100" rx="10" fill="#0b1224" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3"/>
      <rect x="0" y="0" width="420" height="3" rx="1.5" fill="#22d3ee"/>
      <text x="20" y="28" class="mono" font-size="11" fill="#22d3ee" font-weight="600" letter-spacing="1">AI APIs</text>
      <line x1="20" y1="36" x2="400" y2="36" stroke="#1b2340"/>

      <g class="sans" font-size="11.5" fill="#94a3b8">
        <text x="20" y="56"><tspan fill="#22d3ee">●</tspan>  OpenAI GPT-4</text>
        <text x="150" y="56"><tspan fill="#22d3ee">●</tspan>  Anthropic Claude</text>
        <text x="300" y="56"><tspan fill="#22d3ee">●</tspan>  Google Gemini</text>
        <text x="20" y="78"><tspan fill="#22d3ee">●</tspan>  DeepSeek</text>
        <text x="150" y="78"><tspan fill="#22d3ee">●</tspan>  Groq</text>
        <text x="300" y="78"><tspan fill="#22d3ee">●</tspan>  OpenRouter</text>
      </g>
    </g>

    <!-- Bottom -->
    <rect x="24" y="510" width="852" height="2" rx="1" fill="url(#skLine)" opacity="0.2"/>
  </g>
</svg>
