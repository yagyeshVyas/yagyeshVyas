<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="100%" height="auto" role="img" aria-label="What I can build for you">
  <defs>
    <linearGradient id="capBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1e"/><stop offset="100%" stop-color="#0b1224"/>
    </linearGradient>
    <linearGradient id="capLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="cframe"><rect width="900" height="280" rx="14"/></clipPath>
  </defs>
  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform { display: none !important; }
      * { opacity: 1 !important; }
    }
    .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
    .sans { font-family: "Segoe UI", Inter, ui-sans-serif, system-ui, sans-serif; }
  </style>

  <g clip-path="url(#cframe)">
    <rect width="900" height="280" fill="url(#capBg)"/>
    <rect width="900" height="280" rx="14" fill="none" stroke="#1b2340" stroke-width="1.5"/>

    <!-- Header -->
    <text x="24" y="36" class="mono" font-size="13" fill="#f472b6" font-weight="600" letter-spacing="2">CAPABILITIES</text>
    <text x="160" y="36" class="mono" font-size="10" fill="#475569">// what I actually ship, not just logos on a page</text>
    <rect x="24" y="46" width="852" height="1" fill="#1b2340"/>

    <!-- ============ 4 capability cards ============ -->

    <!-- Card 1: Local LLMs -->
    <g transform="translate(24,62)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.2s" fill="freeze"/>
      <rect width="205" height="195" rx="12" fill="#0b1224" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.35"/>
      <rect x="0" y="0" width="205" height="3" rx="1.5" fill="#22d3ee"/>

      <text x="20" y="36" font-size="28">🧠</text>
      <text x="20" y="66" class="sans" font-size="15" font-weight="700" fill="#e2e8f0">Local LLMs</text>
      <text x="20" y="84" class="sans" font-size="11" fill="#64748b">Run production models offline</text>

      <line x1="20" y1="96" x2="185" y2="96" stroke="#1b2340"/>

      <g class="mono" font-size="10" fill="#94a3b8">
        <text x="20" y="116">▸ LoRA fine-tuning on consumer GPUs</text>
        <text x="20" y="132">▸ GGUF quantization (4-bit, 8-bit)</text>
        <text x="20" y="148">▸ Ollama / llama.cpp serving</text>
        <text x="20" y="164">▸ Zero API keys, zero cloud bills</text>
      </g>

      <!-- Tag -->
      <rect x="20" y="172" width="68" height="16" rx="8" fill="#0b0f1e" stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="54" y="183" class="mono" font-size="8" fill="#22d3ee" text-anchor="middle">shipped</text>
    </g>

    <!-- Card 2: RAG Systems -->
    <g transform="translate(239,62)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.4s" fill="freeze"/>
      <rect width="205" height="195" rx="12" fill="#0b1224" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.35"/>
      <rect x="0" y="0" width="205" height="3" rx="1.5" fill="#a78bfa"/>

      <text x="20" y="36" font-size="28">🔗</text>
      <text x="20" y="66" class="sans" font-size="15" font-weight="700" fill="#e2e8f0">RAG Pipelines</text>
      <text x="20" y="84" class="sans" font-size="11" fill="#64748b">Retrieval that actually works</text>

      <line x1="20" y1="96" x2="185" y2="96" stroke="#1b2340"/>

      <g class="mono" font-size="10" fill="#94a3b8">
        <text x="20" y="116">▸ Document ingestion at scale</text>
        <text x="20" y="132">▸ Semantic + keyword hybrid search</text>
        <text x="20" y="148">▸ Re-ranking for precision</text>
        <text x="20" y="164">▸ Citation-grounded responses</text>
      </g>

      <rect x="20" y="172" width="68" height="16" rx="8" fill="#0b0f1e" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="54" y="183" class="mono" font-size="8" fill="#a78bfa" text-anchor="middle">shipped</text>
    </g>

    <!-- Card 3: AI Security -->
    <g transform="translate(454,62)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.6s" fill="freeze"/>
      <rect width="205" height="195" rx="12" fill="#0b1224" stroke="#f472b6" stroke-width="1" stroke-opacity="0.35"/>
      <rect x="0" y="0" width="205" height="3" rx="1.5" fill="#f472b6"/>

      <text x="20" y="36" font-size="28">🛡️</text>
      <text x="20" y="66" class="sans" font-size="15" font-weight="700" fill="#e2e8f0">AI Security</text>
      <text x="20" y="84" class="sans" font-size="11" fill="#64748b">Scan AI-generated code for risks</text>

      <line x1="20" y1="96" x2="185" y2="96" stroke="#1b2340"/>

      <g class="mono" font-size="10" fill="#94a3b8">
        <text x="20" y="116">▸ 699 security rules, 76 MCP tools</text>
        <text x="20" y="132">▸ 13-layer defense pipeline</text>
        <text x="20" y="148">▸ Zero-trust sandbox execution</text>
        <text x="20" y="164">▸ Runs locally, data never leaves</text>
      </g>

      <rect x="20" y="172" width="68" height="16" rx="8" fill="#0b0f1e" stroke="#f472b6" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="54" y="183" class="mono" font-size="8" fill="#f472b6" text-anchor="middle">shipped</text>
    </g>

    <!-- Card 4: Automation -->
    <g transform="translate(669,62)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.8s" fill="freeze"/>
      <rect width="205" height="195" rx="12" fill="#0b1224" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.35"/>
      <rect x="0" y="0" width="205" height="3" rx="1.5" fill="#fbbf24"/>

      <text x="20" y="36" font-size="28">⚡</text>
      <text x="20" y="66" class="sans" font-size="15" font-weight="700" fill="#e2e8f0">Automation</text>
      <text x="20" y="84" class="sans" font-size="11" fill="#64748b">Bots that do the boring work</text>

      <line x1="20" y1="96" x2="185" y2="96" stroke="#1b2340"/>

      <g class="mono" font-size="10" fill="#94a3b8">
        <text x="20" y="116">▸ Browser automation (Playwright)</text>
        <text x="20" y="132">▸ Web scraping at scale</text>
        <text x="20" y="148">▸ Resume analysis pipelines</text>
        <text x="20" y="164">▸ Workflow orchestration</text>
      </g>

      <rect x="20" y="172" width="68" height="16" rx="8" fill="#0b0f1e" stroke="#fbbf24" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="54" y="183" class="mono" font-size="8" fill="#fbbf24" text-anchor="middle">shipped</text>
    </g>

    <!-- Bottom flow -->
    <rect x="24" y="268" width="852" height="2" rx="1" fill="url(#capLine)" opacity="0.2"/>
  </g>
</svg>
