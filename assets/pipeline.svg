<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="100%" height="auto" role="img" aria-label="ML pipeline — how I build models">
  <defs>
    <linearGradient id="pipeBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1e"/><stop offset="100%" stop-color="#0b1224"/>
    </linearGradient>
    <linearGradient id="flowG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <filter id="pgl" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="pframe"><rect width="900" height="320" rx="14"/></clipPath>
  </defs>
  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform, animateMotion { display: none !important; }
      * { opacity: 1 !important; }
    }
    .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
    .sans { font-family: "Segoe UI", Inter, ui-sans-serif, system-ui, sans-serif; }
  </style>

  <g clip-path="url(#pframe)">
    <rect width="900" height="320" fill="url(#pipeBg)"/>
    <rect width="900" height="320" rx="14" fill="none" stroke="#1b2340" stroke-width="1.5"/>

    <!-- Title -->
    <text x="24" y="36" class="mono" font-size="13" fill="#a78bfa" font-weight="600" letter-spacing="2">PIPELINE</text>
    <text x="100" y="36" class="mono" font-size="10" fill="#475569">// how an idea becomes a shipped model</text>
    <rect x="24" y="46" width="852" height="1" fill="#1b2340"/>

    <!-- ============ 4 STAGES ============ -->
    <!-- Stage 1: Data -->
    <g transform="translate(24,64)">
      <rect width="195" height="220" rx="12" fill="#0b1224" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
      <rect x="0" y="0" width="195" height="3" rx="1.5" fill="#22d3ee"/>

      <!-- Icon: database cylinder -->
      <g transform="translate(28,28)" filter="url(#pgl)">
        <ellipse cx="16" cy="6" rx="16" ry="5" fill="none" stroke="#22d3ee" stroke-width="2"/>
        <path d="M0,6 V20 a16,5 0 0 0 32,0 V6" fill="none" stroke="#22d3ee" stroke-width="2"/>
        <ellipse cx="16" cy="13" rx="16" ry="5" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
        <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
      </g>

      <text x="70" y="42" class="mono" font-size="9" fill="#475569">01</text>
      <text x="28" y="78" class="sans" font-size="16" font-weight="700" fill="#e2e8f0">Data</text>
      <text x="28" y="94" class="sans" font-size="11" fill="#64748b">Ingestion &amp; parsing</text>

      <line x1="28" y1="106" x2="167" y2="106" stroke="#1b2340" stroke-width="1"/>

      <g class="mono" font-size="10" fill="#94a3b8">
        <text x="28" y="126">• PDF / DOCX / web scrape</text>
        <text x="28" y="142">• Chunking strategies</text>
        <text x="28" y="158">• Embedding generation</text>
        <text x="28" y="174">• Vector store indexing</text>
      </g>

      <!-- Activity indicator -->
      <circle cx="167" cy="200" r="4" fill="#22d3ee">
        <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <text x="155" y="204" class="mono" font-size="8" fill="#475569" text-anchor="end">active</text>
    </g>

    <!-- Flow arrow 1→2 -->
    <g transform="translate(219,160)">
      <line x1="0" y1="0" x2="42" y2="0" stroke="#1b2340" stroke-width="2"/>
      <line x1="0" y1="0" x2="42" y2="0" stroke="url(#flowG)" stroke-width="2">
        <animate attributeName="stroke-dashoffset" values="42;0" dur="1.5s" repeatCount="indefinite"/>
      </line>
      <polygon points="42,0 34,-5 34,5" fill="#a78bfa">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
      </polygon>
      <!-- data packet -->
      <circle r="3" fill="#22d3ee" filter="url(#pgl)">
        <animateMotion dur="1.5s" repeatCount="indefinite" path="M0,0 L42,0"/>
        <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Stage 2: Train -->
    <g transform="translate(261,64)">
      <rect width="195" height="220" rx="12" fill="#0b1224" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.4"/>
      <rect x="0" y="0" width="195" height="3" rx="1.5" fill="#a78bfa"/>

      <!-- Icon: GPU / chip -->
      <g transform="translate(28,22)" filter="url(#pgl)">
        <rect x="2" y="2" width="28" height="28" rx="4" fill="none" stroke="#a78bfa" stroke-width="2"/>
        <rect x="9" y="9" width="14" height="14" rx="2" fill="#a78bfa" fill-opacity="0.2" stroke="#a78bfa" stroke-width="1"/>
        <text x="16" y="20" font-size="10" text-anchor="middle" fill="#a78bfa" font-weight="700">GPU</text>
        <!-- pins -->
        <g stroke="#a78bfa" stroke-width="1.5">
          <line x1="8" y1="2" x2="8" y2="-2"/><line x1="16" y1="2" x2="16" y2="-2"/><line x1="24" y1="2" x2="24" y2="-2"/>
          <line x1="8" y1="32" x2="8" y2="36"/><line x1="16" y1="32" x2="16" y2="36"/><line x1="24" y1="32" x2="24" y2="36"/>
          <line x1="2" y1="10" x2="-2" y2="10"/><line x1="2" y1="22" x2="-2" y2="22"/>
          <line x1="32" y1="10" x2="36" y2="10"/><line x1="32" y1="22" x2="36" y2="22"/>
        </g>
      </g>

      <text x="70" y="42" class="mono" font-size="9" fill="#475569">02</text>
      <text x="28" y="78" class="sans" font-size="16" font-weight="700" fill="#e2e8f0">Train</text>
      <text x="28" y="94" class="sans" font-size="11" fill="#64748b">Fine-tune &amp; optimize</text>

      <line x1="28" y1="106" x2="167" y2="106" stroke="#1b2340" stroke-width="1"/>

      <g class="mono" font-size="10" fill="#94a3b8">
        <text x="28" y="126">• LoRA / QLoRA adapters</text>
        <text x="28" y="142">• Frozen-base training</text>
        <text x="28" y="158">• Custom loss functions</text>
        <text x="28" y="174">• Mixed-precision (fp16)</text>
      </g>

      <!-- Mini loss curve -->
      <g transform="translate(28,190)">
        <line x1="0" y1="8" x2="60" y2="8" stroke="#1b2340" stroke-width="1"/>
        <path d="M0,2 C15,4 25,6 40,7 L60,8" fill="none" stroke="#a78bfa" stroke-width="1.5" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1">
          <animate attributeName="stroke-dashoffset" values="1;0" dur="3s" repeatCount="indefinite"/>
        </path>
        <circle r="2" fill="#a78bfa">
          <animateMotion dur="3s" repeatCount="indefinite" path="M0,2 C15,4 25,6 40,7 L60,8"/>
        </circle>
        <text x="68" y="11" class="mono" font-size="8" fill="#475569">loss ↓</text>
      </g>
    </g>

    <!-- Flow arrow 2→3 -->
    <g transform="translate(456,160)">
      <line x1="0" y1="0" x2="42" y2="0" stroke="#1b2340" stroke-width="2"/>
      <line x1="0" y1="0" x2="42" y2="0" stroke="url(#flowG)" stroke-width="2"/>
      <polygon points="42,0 34,-5 34,5" fill="#a78bfa">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
      </polygon>
      <circle r="3" fill="#a78bfa" filter="url(#pgl)">
        <animateMotion dur="1.5s" begin="0.5s" repeatCount="indefinite" path="M0,0 L42,0"/>
        <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Stage 3: Evaluate -->
    <g transform="translate(498,64)">
      <rect width="195" height="220" rx="12" fill="#0b1224" stroke="#34d399" stroke-width="1" stroke-opacity="0.4"/>
      <rect x="0" y="0" width="195" height="3" rx="1.5" fill="#34d399"/>

      <!-- Icon: chart/checkmark -->
      <g transform="translate(28,22)" filter="url(#pgl)">
        <circle cx="16" cy="16" r="15" fill="none" stroke="#34d399" stroke-width="2"/>
        <path d="M9,16 L14,21 L23,11" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <animate attributeName="stroke-dasharray" values="0,30;30,0" dur="2s" repeatCount="indefinite"/>
        </path>
      </g>

      <text x="70" y="42" class="mono" font-size="9" fill="#475569">03</text>
      <text x="28" y="78" class="sans" font-size="16" font-weight="700" fill="#e2e8f0">Evaluate</text>
      <text x="28" y="94" class="sans" font-size="11" fill="#64748b">Measure before shipping</text>

      <line x1="28" y1="106" x2="167" y2="106" stroke="#1b2340" stroke-width="1"/>

      <g class="mono" font-size="10" fill="#94a33b8">
        <text x="28" y="126">• Custom eval harness</text>
        <text x="28" y="142">• Retrieval quality (NDCG)</text>
        <text x="28" y="158">• Hallucination checks</text>
        <text x="28" y="174">• Latency benchmarks</text>
      </g>

      <!-- Metrics bar -->
      <g transform="translate(28,190)">
        <rect x="0" y="0" width="139" height="4" rx="2" fill="#1b2340"/>
        <rect x="0" y="0" width="0" height="4" rx="2" fill="#34d399">
          <animate attributeName="width" values="0;108" dur="2.5s" begin="0.5s" fill="freeze"/>
        </rect>
        <text x="0" y="-4" class="mono" font-size="8" fill="#475569">accuracy</text>
        <text x="139" y="-4" class="mono" font-size="8" fill="#34d399" text-anchor="end" opacity="0">
          <set attributeName="opacity" to="1" begin="2.5s"/>
          87%
        </text>
      </g>
    </g>

    <!-- Flow arrow 3→4 -->
    <g transform="translate(693,160)">
      <line x1="0" y1="0" x2="42" y2="0" stroke="#1b2340" stroke-width="2"/>
      <line x1="0" y1="0" x2="42" y2="0" stroke="url(#flowG)" stroke-width="2"/>
      <polygon points="42,0 34,-5 34,5" fill="#34d399">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="1s" repeatCount="indefinite"/>
      </polygon>
      <circle r="3" fill="#34d399" filter="url(#pgl)">
        <animateMotion dur="1.5s" begin="1s" repeatCount="indefinite" path="M0,0 L42,0"/>
        <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" begin="1s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Stage 4: Deploy -->
    <g transform="translate(735,64)">
      <rect width="140" height="220" rx="12" fill="#0b1224" stroke="#f472b6" stroke-width="1" stroke-opacity="0.4"/>
      <rect x="0" y="0" width="140" height="3" rx="1.5" fill="#f472b6"/>

      <!-- Icon: rocket -->
      <g transform="translate(22,20)" filter="url(#pgl)">
        <path d="M20,2 C26,8 26,18 20,28 C14,18 14,8 20,2Z" fill="none" stroke="#f472b6" stroke-width="2"/>
        <circle cx="20" cy="12" r="3" fill="#f472b6"/>
        <path d="M14,22 L10,28 M26,22 L30,28" stroke="#f472b6" stroke-width="1.5" stroke-linecap="round"/>
        <!-- flame -->
        <path d="M20,28 Q18,33 20,38 Q22,33 20,28" fill="#fbbf24" opacity="0.8">
          <animate attributeName="opacity" values="0.4;0.9;0.4" dur="0.5s" repeatCount="indefinite"/>
        </path>
      </g>

      <text x="60" y="42" class="mono" font-size="9" fill="#475569">04</text>
      <text x="22" y="78" class="sans" font-size="16" font-weight="700" fill="#e2e8f0">Deploy</text>
      <text x="22" y="94" class="sans" font-size="11" fill="#64748b">Ship &amp; serve</text>

      <line x1="22" y1="106" x2="118" y2="106" stroke="#1b2340" stroke-width="1"/>

      <g class="mono" font-size="10" fill="#94a3b8">
        <text x="22" y="126">• GGUF quantization</text>
        <text x="22" y="142">• Ollama / llama.cpp</text>
        <text x="22" y="158">• REST API wrapper</text>
        <text x="22" y="174">• Docker packaging</text>
      </g>

      <!-- Status -->
      <g transform="translate(22,196)">
        <rect width="96" height="16" rx="8" fill="#0b0f1e" stroke="#f472b6" stroke-width="1"/>
        <circle cx="10" cy="8" r="3" fill="#f472b6">
          <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
        </circle>
        <text x="20" y="11" class="mono" font-size="7" fill="#f472b6">100% local</text>
      </g>
    </g>

    <!-- Bottom: full pipeline flow line -->
    <rect x="24" y="300" width="852" height="2" rx="1" fill="url(#flowG)" opacity="0.3"/>
    <rect x="24" y="300" width="100" height="2" rx="1" fill="url(#flowG)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 752,0" dur="5s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
