<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 195" width="440" height="195" role="img" aria-label="GitHub stats">
  <style>@media (prefers-reduced-motion: reduce) {
  animate, animateTransform { display: none !important; }
  * { opacity: 1 !important; }
}</style>
  <defs>
    <linearGradient id="ringG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="50%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="hgS" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/><stop offset="50%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="440" height="195" rx="14" fill="#0b0f1e"/>
  <rect width="440" height="195" rx="14" fill="none" stroke="#1b2340" stroke-width="1.5"/>
  <text x="26" y="38" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="13" fill="#22d3ee" font-weight="600" letter-spacing="2">GITHUB STATS</text>
  <rect x="26" y="50" width="388" height="1.5" fill="url(#hgS)" opacity="0.5"/>
  
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.20s" fill="freeze"/>
    <text x="26" y="86" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="13" fill="#fbbf24">★</text>
    <text x="48" y="86" font-family="'Segoe UI', Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94a3b8">Total stars</text>
    <text x="238" y="86" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="end">118</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.35s" fill="freeze"/>
    <text x="26" y="110" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="13" fill="#22d3ee">⧉</text>
    <text x="48" y="110" font-family="'Segoe UI', Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94a3b8">Commits (1y)</text>
    <text x="238" y="110" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="end">176</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.50s" fill="freeze"/>
    <text x="26" y="134" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="13" fill="#a78bfa">⇄</text>
    <text x="48" y="134" font-family="'Segoe UI', Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94a3b8">Pull requests</text>
    <text x="238" y="134" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="end">1</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.65s" fill="freeze"/>
    <text x="26" y="158" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="13" fill="#f472b6">◎</text>
    <text x="48" y="158" font-family="'Segoe UI', Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94a3b8">Issues</text>
    <text x="238" y="158" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="end">0</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.80s" fill="freeze"/>
    <text x="26" y="182" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="13" fill="#34d399">⑂</text>
    <text x="48" y="182" font-family="'Segoe UI', Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94a3b8">Forked</text>
    <text x="238" y="182" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="end">18</text>
  </g>
  <g transform="translate(345,124)">
    <circle r="54" fill="none" stroke="#1b2340" stroke-width="7"/>
    <circle r="54" fill="none" stroke="url(#ringG)" stroke-width="7" stroke-linecap="round"
      stroke-dasharray="339.3" stroke-dashoffset="339.3" transform="rotate(-90)">
      <animate attributeName="stroke-dashoffset" values="339.3;27.1" dur="1.8s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1"/>
    </circle>
    <text y="-2" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="24" font-weight="800" fill="#e2e8f0" text-anchor="middle" opacity="0">185<animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.9s" fill="freeze"/></text>
    <text y="18" font-family="'Segoe UI', Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle" opacity="0">contributions/yr<animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.1s" fill="freeze"/></text>
  </g>
</svg>