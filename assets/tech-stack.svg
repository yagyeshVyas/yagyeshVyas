<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 130" width="720" height="130" role="img" aria-label="ML tech stack">
  <style>
    .card { animation: drift 5s ease-in-out infinite; }
    .c1 { animation-delay: 0s; }
    .c2 { animation-delay: 0.5s; }
    .c3 { animation-delay: 1s; }
    .c4 { animation-delay: 1.5s; }
    .c5 { animation-delay: 0.3s; }
    .c6 { animation-delay: 0.8s; }
    @keyframes drift {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @media (prefers-reduced-motion: reduce) { .card { animation: none; } }
  </style>
  <rect width="720" height="130" fill="#0a0e1a" rx="12"/>
  <rect width="720" height="130" rx="12" fill="none" stroke="#1a2238" stroke-width="1"/>

  <!-- Label -->
  <text x="20" y="28" font-family="JetBrains Mono, monospace" font-size="11" fill="#f59e0b" font-weight="500" letter-spacing="2">STACK</text>
  <line x1="62" y1="24" x2="700" y2="24" stroke="#1a2238" stroke-width="1"/>

  <!-- Python -->
  <g class="card c1" transform="translate(20,48)">
    <rect width="104" height="62" rx="10" fill="#121829" stroke="#3572A5" stroke-width="1.5"/>
    <rect x="0" y="0" width="104" height="3" rx="1.5" fill="#3572A5"/>
    <text x="52" y="30" font-size="22" text-anchor="middle">🐍</text>
    <text x="52" y="50" font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="500">Python</text>
  </g>

  <!-- PyTorch -->
  <g class="card c2" transform="translate(134,48)">
    <rect width="104" height="62" rx="10" fill="#121829" stroke="#ee4c2c" stroke-width="1.5"/>
    <rect x="0" y="0" width="104" height="3" rx="1.5" fill="#ee4c2c"/>
    <text x="52" y="30" font-size="22" text-anchor="middle">🔥</text>
    <text x="52" y="50" font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="500">PyTorch</text>
  </g>

  <!-- HuggingFace -->
  <g class="card c3" transform="translate(248,48)">
    <rect width="104" height="62" rx="10" fill="#121829" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="0" y="0" width="104" height="3" rx="1.5" fill="#fbbf24"/>
    <text x="52" y="30" font-size="22" text-anchor="middle">🤗</text>
    <text x="52" y="50" font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="500">Transformers</text>
  </g>

  <!-- LangChain -->
  <g class="card c4" transform="translate(362,48)">
    <rect width="104" height="62" rx="10" fill="#121829" stroke="#34d399" stroke-width="1.5"/>
    <rect x="0" y="0" width="104" height="3" rx="1.5" fill="#34d399"/>
    <text x="52" y="30" font-size="20" text-anchor="middle">🔗</text>
    <text x="52" y="50" font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="500">LangChain</text>
  </g>

  <!-- Ollama -->
  <g class="card c5" transform="translate(476,48)">
    <rect width="104" height="62" rx="10" fill="#121829" stroke="#818cf8" stroke-width="1.5"/>
    <rect x="0" y="0" width="104" height="3" rx="1.5" fill="#818cf8"/>
    <text x="52" y="30" font-size="20" text-anchor="middle">🦙</text>
    <text x="52" y="50" font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="500">Ollama</text>
  </g>

  <!-- LoRA -->
  <g class="card c6" transform="translate(590,48)">
    <rect width="110" height="62" rx="10" fill="#121829" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="0" y="0" width="110" height="3" rx="1.5" fill="#f59e0b"/>
    <text x="55" y="30" font-size="20" text-anchor="middle">⚙️</text>
    <text x="55" y="50" font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="500">LoRA / GGUF</text>
  </g>
</svg>
