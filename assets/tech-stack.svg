<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 110" width="720" height="110" role="img" aria-label="Animated tech stack">
  <style>
    .pill { animation: float 4s ease-in-out infinite; }
    .p1 { animation-delay: 0s; }
    .p2 { animation-delay: 0.4s; }
    .p3 { animation-delay: 0.8s; }
    .p4 { animation-delay: 1.2s; }
    .p5 { animation-delay: 0.2s; }
    .p6 { animation-delay: 0.6s; }
    .p7 { animation-delay: 1.0s; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .pill { animation: none; }
    }
  </style>
  <rect width="720" height="110" fill="#0d1117" rx="12"/>
  <text x="20" y="28" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#8b949e" font-weight="600">🧠 ML stack &amp; tools</text>

  <!-- Python -->
  <g class="pill p1" transform="translate(20,42)">
    <rect width="80" height="46" rx="23" fill="#21262d" stroke="#3572A5" stroke-width="1.5"/>
    <circle cx="22" cy="23" r="9" fill="#3572A5"/>
    <text x="22" y="27" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Py</text>
    <text x="38" y="28" font-size="12" fill="#e6edf3" font-weight="500">Python</text>
  </g>

  <!-- PyTorch -->
  <g class="pill p2" transform="translate(108,42)">
    <rect width="90" height="46" rx="23" fill="#21262d" stroke="#ee4c2c" stroke-width="1.5"/>
    <circle cx="22" cy="23" r="9" fill="#ee4c2c"/>
    <text x="22" y="27" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">PT</text>
    <text x="38" y="28" font-size="12" fill="#e6edf3" font-weight="500">PyTorch</text>
  </g>

  <!-- HuggingFace -->
  <g class="pill p3" transform="translate(206,42)">
    <rect width="110" height="46" rx="23" fill="#21262d" stroke="#ffd21e" stroke-width="1.5"/>
    <circle cx="22" cy="23" r="9" fill="#ffd21e"/>
    <text x="22" y="27" font-size="12" text-anchor="middle">🤗</text>
    <text x="38" y="28" font-size="12" fill="#e6edf3" font-weight="500">HF</text>
  </g>

  <!-- LangChain -->
  <g class="pill p4" transform="translate(324,42)">
    <rect width="92" height="46" rx="23" fill="#21262d" stroke="#34a853" stroke-width="1.5"/>
    <circle cx="22" cy="23" r="9" fill="#1c3c3c"/>
    <path d="M16 20l3 3-3 3 3 3 3-3 3 3 3-3-3-3 3-3-3-3-3 3-3-3Z" fill="#34a853" transform="scale(0.7) translate(9,7)"/>
    <text x="38" y="28" font-size="12" fill="#e6edf3" font-weight="500">LangChain</text>
  </g>

  <!-- RAG -->
  <g class="pill p5" transform="translate(424,42)">
    <rect width="64" height="46" rx="23" fill="#21262d" stroke="#bc8cff" stroke-width="1.5"/>
    <circle cx="22" cy="23" r="9" fill="#bc8cff"/>
    <text x="22" y="27" font-size="7" font-weight="700" fill="#fff" text-anchor="middle">RAG</text>
    <text x="38" y="28" font-size="12" fill="#e6edf3" font-weight="500">RAG</text>
  </g>

  <!-- LoRA -->
  <g class="pill p6" transform="translate(496,42)">
    <rect width="78" height="46" rx="23" fill="#21262d" stroke="#58a6ff" stroke-width="1.5"/>
    <circle cx="22" cy="23" r="9" fill="#58a6ff"/>
    <text x="22" y="27" font-size="7" font-weight="700" fill="#fff" text-anchor="middle">LoRA</text>
    <text x="38" y="28" font-size="12" fill="#e6edf3" font-weight="500">Fine-tune</text>
  </g>

  <!-- Ollama -->
  <g class="pill p7" transform="translate(582,42)">
    <rect width="118" height="46" rx="23" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
    <circle cx="22" cy="23" r="9" fill="#3fb950"/>
    <text x="22" y="27" font-size="8" font-weight="700" fill="#0d1117" text-anchor="middle">🦙</text>
    <text x="38" y="28" font-size="12" fill="#e6edf3" font-weight="500">Ollama/GGUF</text>
  </g>

  <!-- Shimmer bar -->
  <rect x="0" y="106" width="720" height="3" fill="#21262d" rx="1.5"/>
  <rect x="0" y="106" width="120" height="3" rx="1.5">
    <animate attributeName="x" values="0;600;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#3572A5;#ee4c2c;#bc8cff;#3fb950;#3572A5" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
