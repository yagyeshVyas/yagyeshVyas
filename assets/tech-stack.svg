<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260" role="img" aria-label="Tech stack">
  <defs>
    <linearGradient id="coreG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="edgeG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <filter id="tglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="sframe"><rect width="900" height="260" rx="14"/></clipPath>
  </defs>
  <style>
    .card { animation: drift 5s ease-in-out infinite; }
    .c1 { animation-delay: 0s; } .c2 { animation-delay: .6s; } .c3 { animation-delay: 1.2s; }
    .c4 { animation-delay: .3s; } .c5 { animation-delay: .9s; } .c6 { animation-delay: 1.5s; }
    @keyframes drift { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .bd { animation: borderpulse 4s ease-in-out infinite; }
    @keyframes borderpulse { 0%,100% { stroke-opacity: .35; } 50% { stroke-opacity: .9; } }
    @media (prefers-reduced-motion: reduce) { .card, .bd { animation: none; } animate, animateTransform { display: none !important; } }
    .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
    .sans { font-family: "Segoe UI", Inter, ui-sans-serif, system-ui, sans-serif; }
  </style>

  <g clip-path="url(#sframe)">
    <rect width="900" height="260" fill="#0b0f1e"/>
    <rect width="900" height="260" rx="14" fill="none" stroke="#1b2340" stroke-width="1.5"/>

    <text x="28" y="36" class="mono" font-size="12" fill="#22d3ee" letter-spacing="3" font-weight="600">STACK</text>
    <rect x="90" y="31" width="782" height="1.5" fill="url(#edgeG)" opacity="0.5"/>

    <!-- ============ LEFT: orbit system ============ -->
    <g transform="translate(140,150)">
      <!-- Orbit rings -->
      <circle r="42" fill="none" stroke="#1b2340" stroke-width="1"/>
      <circle r="70" fill="none" stroke="#1b2340" stroke-width="1"/>
      <circle r="42" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="6 60" opacity="0.7">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle r="70" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="6 100" opacity="0.7">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="12s" repeatCount="indefinite"/>
      </circle>

      <!-- Core -->
      <circle r="24" fill="#0b1224" stroke="url(#coreG)" stroke-width="2" filter="url(#tglow)">
        <animate attributeName="r" values="24;26;24" dur="3s" repeatCount="indefinite"/>
      </circle>
      <text y="5" class="mono" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="middle">AI</text>

      <!-- Inner orbiters -->
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
        <circle cx="42" cy="0" r="5" fill="#22d3ee" filter="url(#tglow)"/>
        <circle cx="-42" cy="0" r="4" fill="#34d399" filter="url(#tglow)"/>
      </g>
      <!-- Outer orbiters -->
      <g>
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="12s" repeatCount="indefinite"/>
        <circle cx="70" cy="0" r="5" fill="#a78bfa" filter="url(#tglow)"/>
        <circle cx="-35" cy="60.6" r="4" fill="#f472b6" filter="url(#tglow)"/>
        <circle cx="-35" cy="-60.6" r="3.5" fill="#fbbf24" filter="url(#tglow)"/>
      </g>
    </g>
    <text x="140" y="245" class="mono" font-size="10" fill="#475569" text-anchor="middle">local-first ai systems</text>

    <!-- ============ RIGHT: floating tech cards ============ -->
    <!-- Row 1 -->
    <g class="card c1" transform="translate(280,60)">
      <rect width="180" height="72" rx="12" fill="#0b1224" class="bd" stroke="#3572A5" stroke-width="1.5"/>
      <text x="24" y="45" font-size="26">🐍</text>
      <text x="58" y="34" class="sans" font-size="14" fill="#e2e8f0" font-weight="600">Python</text>
      <text x="58" y="52" class="mono" font-size="10" fill="#64748b">daily driver</text>
    </g>
    <g class="card c2" transform="translate(480,60)">
      <rect width="180" height="72" rx="12" fill="#0b1224" class="bd" stroke="#ee4c2c" stroke-width="1.5"/>
      <text x="24" y="45" font-size="26">🔥</text>
      <text x="58" y="34" class="sans" font-size="14" fill="#e2e8f0" font-weight="600">PyTorch</text>
      <text x="58" y="52" class="mono" font-size="10" fill="#64748b">training + inference</text>
    </g>
    <g class="card c3" transform="translate(680,60)">
      <rect width="192" height="72" rx="12" fill="#0b1224" class="bd" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="24" y="45" font-size="26">🤗</text>
      <text x="58" y="34" class="sans" font-size="14" fill="#e2e8f0" font-weight="600">Transformers</text>
      <text x="58" y="52" class="mono" font-size="10" fill="#64748b">hub + finetunes</text>
    </g>
    <!-- Row 2 -->
    <g class="card c4" transform="translate(280,152)">
      <rect width="180" height="72" rx="12" fill="#0b1224" class="bd" stroke="#34d399" stroke-width="1.5"/>
      <text x="24" y="45" font-size="24">🔗</text>
      <text x="58" y="34" class="sans" font-size="14" fill="#e2e8f0" font-weight="600">LangChain</text>
      <text x="58" y="52" class="mono" font-size="10" fill="#64748b">rag pipelines</text>
    </g>
    <g class="card c5" transform="translate(480,152)">
      <rect width="180" height="72" rx="12" fill="#0b1224" class="bd" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="24" y="45" font-size="24">🦙</text>
      <text x="58" y="34" class="sans" font-size="14" fill="#e2e8f0" font-weight="600">Ollama</text>
      <text x="58" y="52" class="mono" font-size="10" fill="#64748b">local serving</text>
    </g>
    <g class="card c6" transform="translate(680,152)">
      <rect width="192" height="72" rx="12" fill="#0b1224" class="bd" stroke="#f472b6" stroke-width="1.5"/>
      <text x="24" y="45" font-size="24">⚙️</text>
      <text x="58" y="34" class="sans" font-size="14" fill="#e2e8f0" font-weight="600">LoRA / GGUF</text>
      <text x="58" y="52" class="mono" font-size="10" fill="#64748b">fine-tune + export</text>
    </g>
  </g>
</svg>
