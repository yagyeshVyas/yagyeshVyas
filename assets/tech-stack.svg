<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 110" width="720" height="110" role="img" aria-label="Animated tech stack">
  <style>
    .pill { animation: float 4s ease-in-out infinite; }
    .p1 { animation-delay: 0s; }
    .p2 { animation-delay: 0.4s; }
    .p3 { animation-delay: 0.8s; }
    .p4 { animation-delay: 1.2s; }
    .p5 { animation-delay: 0.2s; }
    .p6 { animation-delay: 0.6s; }
    .p7 { animation-delay: 1.0s; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .pill { animation: none; }
    }
  </style>
  <rect width="720" height="110" fill="#0d1117" rx="12"/>
  <text x="20" y="28" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#8b949e" font-weight="600">🛠 Tech I reach for</text>

  <!-- TypeScript -->
  <g class="pill p1" transform="translate(20,42)">
    <rect width="92" height="46" rx="23" fill="#21262d" stroke="#3178c6" stroke-width="1.5"/>
    <circle cx="22" cy="23" r="9" fill="#3178c6"/>
    <text x="22" y="28" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">TS</text>
    <text x="40" y="28" font-size="12" fill="#e6edf3" font-weight="500">TypeScript</text>
  </g>

  <!-- React -->
  <g class="pill p2" transform="translate(120,42)">
    <rect width="80" height="46" rx="23" fill="#21262d" stroke="#58a6ff" stroke-width="1.5"/>
    <circle cx="22" cy="23" r="9" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    <ellipse cx="22" cy="23" rx="9" ry="3.5" fill="none" stroke="#58a6ff" stroke-width="1"/>
    <ellipse cx="22" cy="23" rx="9" ry="3.5" fill="none" stroke="#58a6ff" stroke-width="1" transform="rotate(60 22 23)"/>
    <ellipse cx="22" cy="23" rx="9" ry="3.5" fill="none" stroke="#58a6ff" stroke-width="1" transform="rotate(120 22 23)"/>
    <circle cx="22" cy="23" r="2" fill="#58a6ff"/>
    <text x="38" y="28" font-size="12" fill="#e6edf3" font-weight="500">React</text>
  </g>

  <!-- Next.js -->
  <g class="pill p3" transform="translate(208,42)">
    <rect width="82" height="46" rx="23" fill="#21262d" stroke="#e6edf3" stroke-width="1.5"/>
    <circle cx="22" cy="23" r="9" fill="#0d1117"/>
    <text x="22" y="27" font-size="12" font-weight="800" fill="#fff" text-anchor="middle">N</text>
    <text x="38" y="28" font-size="12" fill="#e6edf3" font-weight="500">Next.js</text>
  </g>

  <!-- Three.js -->
  <g class="pill p4" transform="translate(298,42)">
    <rect width="92" height="46" rx="23" fill="#21262d" stroke="#bc8cff" stroke-width="1.5"/>
    <polygon points="14,13 30,13 38,28 30,43 14,43 6,28" fill="none" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="46" y="28" font-size="12" fill="#e6edf3" font-weight="500">Three.js</text>
  </g>

  <!-- GSAP -->
  <g class="pill p5" transform="translate(398,42)">
    <rect width="74" height="46" rx="23" fill="#21262d" stroke="#88ce02" stroke-width="1.5"/>
    <text x="20" y="28" font-size="10" font-weight="700" fill="#88ce02" text-anchor="middle">GSAP</text>
    <text x="44" y="28" font-size="12" fill="#e6edf3" font-weight="500">Motion</text>
  </g>

  <!-- Node.js -->
  <g class="pill p6" transform="translate(480,42)">
    <rect width="82" height="46" rx="23" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
    <path d="M22 14a9 9 0 0 0 0 18 4 4 0 0 0 2-7 4 4 0 0 0-2-7Z" fill="#3fb950"/>
    <text x="38" y="28" font-size="12" fill="#e6edf3" font-weight="500">Node.js</text>
  </g>

  <!-- Tailwind -->
  <g class="pill p7" transform="translate(570,42)">
    <rect width="92" height="46" rx="23" fill="#21262d" stroke="#38bdf8" stroke-width="1.5"/>
    <path d="M14 23c2-4 5-6 8-6 4 0 5 3 7 3s4-3 7-3c2 0 4 1 5 3" stroke="#38bdf8" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M14 30c2-4 5-5 8-5 4 0 4 2 7 2s4-2 7-2c2 0 4 1 5 3" stroke="#38bdf8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
    <text x="50" y="28" font-size="12" fill="#e6edf3" font-weight="500">Tailwind</text>
  </g>

  <!-- Bottom shimmer -->
  <rect x="0" y="106" width="720" height="3" fill="#21262d" rx="1.5"/>
  <rect x="0" y="106" width="120" height="3" rx="1.5">
    <animate attributeName="x" values="0;600;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#58a6ff;#bc8cff;#3fb950;#58a6ff" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
