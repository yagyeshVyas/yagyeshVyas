<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 320" width="100%" height="auto" role="img" aria-label="Yagyesh Vyas — AI/ML Engineer">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#121829"/>
    </linearGradient>
    <linearGradient id="amberG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="indigoG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowI" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform, animateMotion { display: none !important; }
    }
  </style>

  <!-- Background -->
  <rect width="840" height="320" fill="url(#bgG)" rx="16"/>

  <!-- Ambient glow -->
  <circle cx="80" cy="60" r="100" fill="url(#glowA)">
    <animate attributeName="cx" values="80;140;80" dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle cx="760" cy="260" r="120" fill="url(#glowI)">
    <animate attributeName="cx" values="760;700;760" dur="16s" repeatCount="indefinite"/>
  </circle>

  <!-- ============================================================
       NEURAL NETWORK GRAPH (signature element)
       Data pulses travel left → right through the layers
       ============================================================ -->
  <g opacity="0.9">
    <!-- Layer 1 (input) → Layer 2 (hidden) connections -->
    <g stroke="#818cf8" stroke-width="0.6" opacity="0.3">
      <line x1="240" y1="100" x2="340" y2="70"/>
      <line x1="240" y1="100" x2="340" y2="130"/>
      <line x1="240" y1="100" x2="340" y2="190"/>
      <line x1="240" y1="160" x2="340" y2="70"/>
      <line x1="240" y1="160" x2="340" y2="130"/>
      <line x1="240" y1="160" x2="340" y2="190"/>
      <line x1="240" y1="160" x2="340" y2="250"/>
      <line x1="240" y1="220" x2="340" y2="130"/>
      <line x1="240" y1="220" x2="340" y2="190"/>
      <line x1="240" y1="220" x2="340" y2="250"/>
    </g>
    <!-- Layer 2 → Layer 3 connections -->
    <g stroke="#a78bfa" stroke-width="0.6" opacity="0.3">
      <line x1="340" y1="70" x2="440" y2="100"/>
      <line x1="340" y1="70" x2="440" y2="160"/>
      <line x1="340" y1="70" x2="440" y2="220"/>
      <line x1="340" y1="130" x2="440" y2="100"/>
      <line x1="340" y1="130" x2="440" y2="160"/>
      <line x1="340" y1="130" x2="440" y2="220"/>
      <line x1="340" y1="190" x2="440" y2="100"/>
      <line x1="340" y1="190" x2="440" y2="160"/>
      <line x1="340" y1="190" x2="440" y2="220"/>
      <line x1="340" y1="250" x2="440" y2="160"/>
      <line x1="340" y1="250" x2="440" y2="220"/>
    </g>
    <!-- Layer 3 → Layer 4 (output) connections -->
    <g stroke="#f59e0b" stroke-width="0.6" opacity="0.3">
      <line x1="440" y1="100" x2="540" y2="130"/>
      <line x1="440" y1="100" x2="540" y2="190"/>
      <line x1="440" y1="160" x2="540" y2="130"/>
      <line x1="440" y1="160" x2="540" y2="130"/>
      <line x1="440" y1="160" x2="540" y2="190"/>
      <line x1="440" y1="220" x2="540" y2="130"/>
      <line x1="440" y1="220" x2="540" y2="190"/>
    </g>

    <!-- Data pulses traveling along connections (Layer 1 → 2) -->
    <circle r="2.5" fill="#818cf8" filter="url(#softGlow)">
      <animateMotion dur="2.5s" repeatCount="indefinite" path="M240,100 L340,70"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" fill="#818cf8" filter="url(#softGlow)">
      <animateMotion dur="2.5s" begin="0.4s" repeatCount="indefinite" path="M240,160 L340,130"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" fill="#818cf8" filter="url(#softGlow)">
      <animateMotion dur="2.5s" begin="0.8s" repeatCount="indefinite" path="M240,220 L340,190"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" fill="#818cf8" filter="url(#softGlow)">
      <animateMotion dur="2.5s" begin="1.2s" repeatCount="indefinite" path="M240,100 L340,190"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" fill="#818cf8" filter="url(#softGlow)">
      <animateMotion dur="2.5s" begin="1.6s" repeatCount="indefinite" path="M240,160 L340,250"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" begin="1.6s" repeatCount="indefinite"/>
    </circle>

    <!-- Data pulses (Layer 2 → 3) -->
    <circle r="2.5" fill="#a78bfa" filter="url(#softGlow)">
      <animateMotion dur="2.5s" begin="0.6s" repeatCount="indefinite" path="M340,70 L440,160"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" fill="#a78bfa" filter="url(#softGlow)">
      <animateMotion dur="2.5s" begin="1.0s" repeatCount="indefinite" path="M340,130 L440,100"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" begin="1.0s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" fill="#a78bfa" filter="url(#softGlow)">
      <animateMotion dur="2.5s" begin="1.4s" repeatCount="indefinite" path="M340,250 L440,220"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" begin="1.4s" repeatCount="indefinite"/>
    </circle>

    <!-- Data pulses (Layer 3 → 4) -->
    <circle r="3" fill="#f59e0b" filter="url(#softGlow)">
      <animateMotion dur="2.5s" begin="1.2s" repeatCount="indefinite" path="M440,160 L540,130"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#f59e0b" filter="url(#softGlow)">
      <animateMotion dur="2.5s" begin="1.8s" repeatCount="indefinite" path="M440,100 L540,190"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" begin="1.8s" repeatCount="indefinite"/>
    </circle>

    <!-- Nodes Layer 1 (Input) -->
    <g>
      <circle cx="240" cy="100" r="6" fill="#121829" stroke="#818cf8" stroke-width="1.5"/>
      <circle cx="240" cy="160" r="6" fill="#121829" stroke="#818cf8" stroke-width="1.5"/>
      <circle cx="240" cy="220" r="6" fill="#121829" stroke="#818cf8" stroke-width="1.5">
        <animate attributeName="r" values="6;7.5;6" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>
    <!-- Nodes Layer 2 (Hidden) -->
    <g>
      <circle cx="340" cy="70" r="6" fill="#121829" stroke="#a78bfa" stroke-width="1.5">
        <animate attributeName="r" values="6;7.5;6" dur="3s" begin="0.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="340" cy="130" r="6" fill="#121829" stroke="#a78bfa" stroke-width="1.5"/>
      <circle cx="340" cy="190" r="6" fill="#121829" stroke="#a78bfa" stroke-width="1.5">
        <animate attributeName="r" values="6;7.5;6" dur="3s" begin="0.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="340" cy="250" r="6" fill="#121829" stroke="#a78bfa" stroke-width="1.5"/>
    </g>
    <!-- Nodes Layer 3 (Hidden) -->
    <g>
      <circle cx="440" cy="100" r="6" fill="#121829" stroke="#a78bfa" stroke-width="1.5"/>
      <circle cx="440" cy="160" r="6" fill="#121829" stroke="#a78bfa" stroke-width="1.5">
        <animate attributeName="r" values="6;8;6" dur="3s" begin="0.9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="440" cy="220" r="6" fill="#121829" stroke="#a78bfa" stroke-width="1.5"/>
    </g>
    <!-- Nodes Layer 4 (Output) -->
    <g>
      <circle cx="540" cy="130" r="7" fill="#f59e0b" stroke="#fbbf24" stroke-width="2" filter="url(#softGlow)">
        <animate attributeName="r" values="7;9;7" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="540" cy="190" r="5" fill="#121829" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
    </g>

    <!-- Layer labels -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#475569" text-anchor="middle">
      <text x="240" y="295">input</text>
      <text x="340" y="295">hidden_1</text>
      <text x="440" y="295">hidden_2</text>
      <text x="540" y="295">output</text>
    </g>
  </g>

  <!-- ============================================================
       TEXT CONTENT (right side, clean hierarchy)
       ============================================================ -->

  <!-- Eyebrow -->
  <text x="60" y="70" font-family="JetBrains Mono, monospace" font-size="11" fill="#f59e0b" letter-spacing="3" font-weight="500">
    AI / ML ENGINEER
    <animate attributeName="opacity" values="0;1" dur="0.6s" fill="freeze"/>
  </text>

  <!-- Name -->
  <text x="60" y="120" font-family="Space Grotesk, ui-sans-serif, system-ui, sans-serif" font-size="44" font-weight="700" fill="#e2e8f0" letter-spacing="-1.5">
    Yagyesh Vyas
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.2s" fill="freeze"/>
  </text>

  <!-- Tagline -->
  <text x="60" y="155" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#64748b">
    Building local LLMs, RAG pipelines &amp; fine-tuned models that run offline.
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.5s" fill="freeze"/>
  </text>

  <!-- Status pill -->
  <g>
    <rect x="60" y="180" width="180" height="30" rx="15" fill="#0a0e1a" stroke="#34d399" stroke-width="1" opacity="0.9"/>
    <circle cx="75" cy="195" r="4" fill="#34d399">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="87" y="199" font-family="Inter, sans-serif" font-size="12" fill="#34d399" font-weight="500">Open to collaborations</text>
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.8s" fill="freeze"/>
  </g>

  <!-- Location -->
  <text x="60" y="235" font-family="JetBrains Mono, monospace" font-size="11" fill="#475569">
    <tspan fill="#64748b"> Located </tspan> San Francisco Bay Area
  </text>

  <!-- Focus tags -->
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#818cf8">
    <text x="60" y="260">LLMs</text>
    <text x="110" y="260" fill="#475569">·</text>
    <text x="125" y="260">RAG</text>
    <text x="165" y="260" fill="#475569">·</text>
    <text x="180" y="260">LoRA</text>
    <text x="225" y="260" fill="#475569">·</text>
    <text x="240" y="260">GGUF</text>
    <text x="285" y="260" fill="#475569">·</text>
    <text x="300" y="260">PyTorch</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="316" width="840" height="4" fill="url(#amberG)" opacity="0">
    <animate attributeName="opacity" values="0;0.8" dur="1s" begin="0.6s" fill="freeze"/>
    <animate attributeName="width" values="0;840" dur="1s" begin="0.6s" fill="freeze"/>
  </rect>
</svg>
