<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="100%" height="auto" role="img" aria-label="Yagyesh Vyas — AI/ML Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05060f"/>
      <stop offset="55%" stop-color="#0a0d1f"/>
      <stop offset="100%" stop-color="#0d0a1f"/>
    </linearGradient>

    <!-- Animated aurora gradient for the name -->
    <linearGradient id="nameG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#a78bfa;#f472b6;#22d3ee" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#a78bfa">
        <animate attributeName="stop-color" values="#a78bfa;#f472b6;#22d3ee;#a78bfa" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#f472b6">
        <animate attributeName="stop-color" values="#f472b6;#22d3ee;#a78bfa;#f472b6" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="lineG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="auroraCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="frame"><rect width="1000" height="420" rx="18"/></clipPath>
  </defs>

  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform, animateMotion { display: none !important; }
      * { opacity: 1 !important; }
    }
    .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, monospace; }
    .sans { font-family: "Segoe UI", Inter, ui-sans-serif, system-ui, sans-serif; }
  </style>

  <g clip-path="url(#frame)">
    <rect width="1000" height="420" fill="url(#bg)"/>

    <!-- Dot grid -->
    <g fill="#233054" opacity="0.5">
      <g id="dotrow">
        <circle cx="20" cy="20" r="1"/><circle cx="70" cy="20" r="1"/><circle cx="120" cy="20" r="1"/><circle cx="170" cy="20" r="1"/><circle cx="220" cy="20" r="1"/><circle cx="270" cy="20" r="1"/><circle cx="320" cy="20" r="1"/><circle cx="370" cy="20" r="1"/><circle cx="420" cy="20" r="1"/><circle cx="470" cy="20" r="1"/><circle cx="520" cy="20" r="1"/><circle cx="570" cy="20" r="1"/><circle cx="620" cy="20" r="1"/><circle cx="670" cy="20" r="1"/><circle cx="720" cy="20" r="1"/><circle cx="770" cy="20" r="1"/><circle cx="820" cy="20" r="1"/><circle cx="870" cy="20" r="1"/><circle cx="920" cy="20" r="1"/><circle cx="970" cy="20" r="1"/>
      </g>
      <use href="#dotrow" y="50"/><use href="#dotrow" y="100"/><use href="#dotrow" y="150"/><use href="#dotrow" y="200"/><use href="#dotrow" y="250"/><use href="#dotrow" y="300"/><use href="#dotrow" y="350"/>
    </g>

    <!-- Aurora blobs drifting -->
    <circle cx="150" cy="80" r="220" fill="url(#auroraCyan)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 60,30; 0,0" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="860" cy="120" r="240" fill="url(#auroraViolet)">
      <animateTransform attributeName="transform" type="translate" values="0,0; -50,40; 0,0" dur="19s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="400" r="260" fill="url(#auroraPink)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 40,-30; 0,0" dur="22s" repeatCount="indefinite"/>
    </circle>

    <!-- Twinkling stars -->
    <g fill="#e2e8f0">
      <circle cx="90" cy="330" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="300" cy="55" r="1.1"><animate attributeName="opacity" values="1;0.15;1" dur="4s" repeatCount="indefinite"/></circle>
      <circle cx="480" cy="120" r="1.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" begin="0.8s" repeatCount="indefinite"/></circle>
      <circle cx="560" cy="330" r="1.2"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="3.4s" begin="0.4s" repeatCount="indefinite"/></circle>
      <circle cx="950" cy="60" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" begin="1.2s" repeatCount="indefinite"/></circle>
      <circle cx="920" cy="370" r="1.1"><animate attributeName="opacity" values="1;0.2;1" dur="3.8s" begin="0.6s" repeatCount="indefinite"/></circle>
      <circle cx="40" cy="180" r="1"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.4s" begin="1.6s" repeatCount="indefinite"/></circle>
    </g>

    <!-- Shooting star -->
    <g>
      <line x1="0" y1="0" x2="70" y2="18" stroke="url(#lineG)" stroke-width="1.6" opacity="0">
        <animateMotion dur="7s" repeatCount="indefinite" path="M980,30 L640,120"/>
        <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.05;0.12;0.22;1" dur="7s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- ================= LEFT: identity ================= -->

    <!-- Rotating role words -->
    <g class="mono" font-size="13" letter-spacing="4" font-weight="600">
      <text x="70" y="106" fill="#22d3ee" opacity="0">AI / ML ENGINEER
        <animate attributeName="opacity" dur="9s" repeatCount="indefinite" keyTimes="0;0.03;0.29;0.333;1" values="0;1;1;0;0"/>
      </text>
      <text x="70" y="106" fill="#a78bfa" opacity="0">LLM &amp; RAG BUILDER
        <animate attributeName="opacity" dur="9s" begin="3s" repeatCount="indefinite" keyTimes="0;0.03;0.29;0.333;1" values="0;1;1;0;0"/>
      </text>
      <text x="70" y="106" fill="#f472b6" opacity="0">LOCAL-FIRST AI
        <animate attributeName="opacity" dur="9s" begin="6s" repeatCount="indefinite" keyTimes="0;0.03;0.29;0.333;1" values="0;1;1;0;0"/>
      </text>
    </g>
    <rect x="70" y="116" width="46" height="2" rx="1" fill="url(#lineG)">
      <animate attributeName="width" values="20;60;20" dur="4.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Name with living gradient -->
    <text x="68" y="178" class="sans" font-size="58" font-weight="800" letter-spacing="-2" fill="url(#nameG)" opacity="0">
      Yagyesh Vyas
      <animate attributeName="opacity" values="0;1" dur="0.9s" begin="0.2s" fill="freeze"/>
    </text>

    <!-- Tagline -->
    <text x="70" y="212" class="sans" font-size="16" fill="#94a3b8" opacity="0">
      Fine-tuning, RAG pipelines &amp; models that run 100% offline — zero API keys.
      <animate attributeName="opacity" values="0;1" dur="0.9s" begin="0.5s" fill="freeze"/>
    </text>

    <!-- Status pill -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.9s" fill="freeze"/>
      <rect x="70" y="234" width="200" height="32" rx="16" fill="#0b1224" stroke="#34d399" stroke-width="1"/>
      <circle cx="88" cy="250" r="4.5" fill="#34d399" filter="url(#glow)">
        <animate attributeName="opacity" values="1;0.25;1" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="88" cy="250" r="4.5" fill="none" stroke="#34d399" stroke-width="1">
        <animate attributeName="r" values="4.5;11" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <text x="102" y="255" class="sans" font-size="13" fill="#34d399" font-weight="600">Open to collaborations</text>
    </g>

    <!-- Focus chips -->
    <g class="mono" font-size="11" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="1.2s" fill="freeze"/>
      <g>
        <rect x="70" y="292" width="58" height="24" rx="12" fill="#0b1224" stroke="#22d3ee" stroke-opacity="0.45"/>
        <text x="99" y="308" fill="#22d3ee" text-anchor="middle">LLMs</text>
      </g>
      <g>
        <rect x="136" y="292" width="52" height="24" rx="12" fill="#0b1224" stroke="#a78bfa" stroke-opacity="0.45"/>
        <text x="162" y="308" fill="#a78bfa" text-anchor="middle">RAG</text>
      </g>
      <g>
        <rect x="196" y="292" width="58" height="24" rx="12" fill="#0b1224" stroke="#f472b6" stroke-opacity="0.45"/>
        <text x="225" y="308" fill="#f472b6" text-anchor="middle">LoRA</text>
      </g>
      <g>
        <rect x="262" y="292" width="60" height="24" rx="12" fill="#0b1224" stroke="#fbbf24" stroke-opacity="0.45"/>
        <text x="292" y="308" fill="#fbbf24" text-anchor="middle">GGUF</text>
      </g>
      <g>
        <rect x="330" y="292" width="78" height="24" rx="12" fill="#0b1224" stroke="#34d399" stroke-opacity="0.45"/>
        <text x="369" y="308" fill="#34d399" text-anchor="middle">PyTorch</text>
      </g>
    </g>

    <!-- ================= RIGHT: neural network ================= -->
    <g>
      <!-- Connections draw themselves in -->
      <g stroke-width="0.8" fill="none">
        <g stroke="#22d3ee" opacity="0.35">
          <line x1="620" y1="110" x2="750" y2="80"  pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.2s" begin="0.3s" fill="freeze"/></line>
          <line x1="620" y1="110" x2="750" y2="160" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.2s" begin="0.4s" fill="freeze"/></line>
          <line x1="620" y1="190" x2="750" y2="80"  pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.2s" begin="0.5s" fill="freeze"/></line>
          <line x1="620" y1="190" x2="750" y2="160" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.2s" begin="0.6s" fill="freeze"/></line>
          <line x1="620" y1="190" x2="750" y2="240" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.2s" begin="0.7s" fill="freeze"/></line>
          <line x1="620" y1="270" x2="750" y2="160" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.2s" begin="0.8s" fill="freeze"/></line>
          <line x1="620" y1="270" x2="750" y2="240" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.2s" begin="0.9s" fill="freeze"/></line>
          <line x1="620" y1="270" x2="750" y2="320" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.2s" begin="1.0s" fill="freeze"/></line>
          <line x1="620" y1="110" x2="750" y2="240" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.2s" begin="1.1s" fill="freeze"/></line>
        </g>
        <g stroke="#a78bfa" opacity="0.35">
          <line x1="750" y1="80"  x2="880" y2="140" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.2s" begin="1.0s" fill="freeze"/></line>
          <line x1="750" y1="160" x2="880" y2="140" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.2s" begin="1.1s" fill="freeze"/></line>
          <line x1="750" y1="160" x2="880" y2="230" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.2s" begin="1.2s" fill="freeze"/></line>
          <line x1="750" y1="240" x2="880" y2="140" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.2s" begin="1.3s" fill="freeze"/></line>
          <line x1="750" y1="240" x2="880" y2="230" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.2s" begin="1.4s" fill="freeze"/></line>
          <line x1="750" y1="320" x2="880" y2="230" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.2s" begin="1.5s" fill="freeze"/></line>
        </g>
      </g>

      <!-- Data pulses -->
      <g>
        <circle r="3" fill="#22d3ee" filter="url(#glow)"><animateMotion dur="2.2s" begin="1.6s" repeatCount="indefinite" path="M620,110 L750,80"/><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin="1.6s" repeatCount="indefinite"/></circle>
        <circle r="3" fill="#22d3ee" filter="url(#glow)"><animateMotion dur="2.2s" begin="2.1s" repeatCount="indefinite" path="M620,190 L750,240"/><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin="2.1s" repeatCount="indefinite"/></circle>
        <circle r="3" fill="#22d3ee" filter="url(#glow)"><animateMotion dur="2.2s" begin="2.6s" repeatCount="indefinite" path="M620,270 L750,160"/><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin="2.6s" repeatCount="indefinite"/></circle>
        <circle r="3" fill="#a78bfa" filter="url(#glow)"><animateMotion dur="2.2s" begin="2.4s" repeatCount="indefinite" path="M750,80 L880,140"/><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin="2.4s" repeatCount="indefinite"/></circle>
        <circle r="3" fill="#a78bfa" filter="url(#glow)"><animateMotion dur="2.2s" begin="3.0s" repeatCount="indefinite" path="M750,240 L880,230"/><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin="3.0s" repeatCount="indefinite"/></circle>
        <circle r="3.5" fill="#f472b6" filter="url(#glow)"><animateMotion dur="2.2s" begin="3.4s" repeatCount="indefinite" path="M750,160 L880,230"/><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin="3.4s" repeatCount="indefinite"/></circle>
      </g>

      <!-- Nodes -->
      <g fill="#0b1224" stroke-width="1.6">
        <circle cx="620" cy="110" r="7" stroke="#22d3ee"><animate attributeName="r" values="7;8.5;7" dur="3s" repeatCount="indefinite"/></circle>
        <circle cx="620" cy="190" r="7" stroke="#22d3ee"><animate attributeName="r" values="7;8.5;7" dur="3s" begin="0.5s" repeatCount="indefinite"/></circle>
        <circle cx="620" cy="270" r="7" stroke="#22d3ee"><animate attributeName="r" values="7;8.5;7" dur="3s" begin="1s" repeatCount="indefinite"/></circle>
        <circle cx="750" cy="80"  r="7" stroke="#a78bfa"><animate attributeName="r" values="7;8.5;7" dur="3s" begin="0.3s" repeatCount="indefinite"/></circle>
        <circle cx="750" cy="160" r="7" stroke="#a78bfa"><animate attributeName="r" values="7;8.5;7" dur="3s" begin="0.8s" repeatCount="indefinite"/></circle>
        <circle cx="750" cy="240" r="7" stroke="#a78bfa"><animate attributeName="r" values="7;8.5;7" dur="3s" begin="1.3s" repeatCount="indefinite"/></circle>
        <circle cx="750" cy="320" r="7" stroke="#a78bfa"><animate attributeName="r" values="7;8.5;7" dur="3s" begin="1.8s" repeatCount="indefinite"/></circle>
        <circle cx="880" cy="230" r="6" stroke="#f472b6" opacity="0.7"/>
      </g>

      <!-- Output core with orbit ring -->
      <g>
        <circle cx="880" cy="140" r="10" fill="#f472b6" filter="url(#glow)">
          <animate attributeName="r" values="10;12;10" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="880" cy="140" r="20" fill="none" stroke="#f472b6" stroke-width="1" stroke-dasharray="4 6" opacity="0.6">
          <animateTransform attributeName="transform" type="rotate" from="0 880 140" to="360 880 140" dur="10s" repeatCount="indefinite"/>
        </circle>
        <circle cx="880" cy="140" r="30" fill="none" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="2 8" opacity="0.4">
          <animateTransform attributeName="transform" type="rotate" from="360 880 140" to="0 880 140" dur="14s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- Layer labels -->
      <g class="mono" font-size="10" fill="#475569" text-anchor="middle">
        <text x="620" y="352">input</text>
        <text x="750" y="352">hidden</text>
        <text x="880" y="352">output</text>
      </g>
    </g>

    <!-- Bottom shimmer line -->
    <rect x="0" y="414" width="1000" height="6" fill="url(#lineG)">
      <animateTransform attributeName="transform" type="translate" values="-1000,0; 1000,0" dur="5s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="416" width="1000" height="4" fill="#1b2340"/>
  </g>
</svg>
