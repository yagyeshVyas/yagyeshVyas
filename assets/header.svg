<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="100%" height="auto" role="img" aria-label="Animated banner">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="txtGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="#3fb950"/>
      <animate attributeName="x1" values="-1;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0"/>
      <animate attributeName="x1" values="-0.5;1" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0.5;1.5" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bc8cff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform, animateMotion { display: none !important; }
      * { animation: none !important; }
    }
  </style>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bgGrad)"/>
  <rect width="800" height="280" fill="url(#shimmer)"/>

  <!-- Floating orbs (parallax) -->
  <circle cx="120" cy="80" r="90" fill="url(#orb1)">
    <animate attributeName="cx" values="120;180;120" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;110;80" dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="200" r="110" fill="url(#orb2)">
    <animate attributeName="cx" values="680;620;680" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="200;170;200" dur="13s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="50" r="55" fill="url(#orb3)">
    <animate attributeName="cy" values="50;90;50" dur="9s" repeatCount="indefinite"/>
  </circle>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#58a6ff" stroke-width="0.5">
    <path d="M0 40 H800 M0 80 H800 M0 120 H800 M0 160 H800 M0 200 H800 M0 240 H800"/>
    <path d="M40 0 V280 M120 0 V280 M200 0 V280 M290 0 V280 M370 0 V280 M450 0 V280 M530 0 V280 M620 0 V280 M700 0 V280 M780 0 V280"/>
  </g>

  <!-- Profile picture ring -->
  <circle cx="100" cy="140" r="58" fill="none" stroke="url(#txtGrad)" stroke-width="2" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 100 140" to="360 100 140" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="140" r="50" fill="#21262d" stroke="#30363d" stroke-width="2"/>
  <text x="100" y="153" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="700" fill="#e6edf3" text-anchor="middle">YA</text>

  <!-- Online status dot -->
  <circle cx="135" cy="175" r="6" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="135" cy="175" r="6" fill="none" stroke="#3fb950" stroke-width="1.5">
    <animate attributeName="r" values="6;12;6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Name with wave emoji -->
  <text x="180" y="125" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="32" font-weight="700" fill="url(#txtGrad)">Hi, I'm Yagyesh Vyas</text>
  <text x="580" y="125" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="28" text-anchor="start">
    👋
    <animateTransform attributeName="transform" type="rotate" values="-15 590 110;15 590 110;-15 590 110" dur="1.2s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle (typewriter appearing) -->
  <text x="180" y="155" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#8b949e">
    <tspan>AI/ML Engineer · LLMs · RAG · Fine-Tuning · Local AI</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze"/>
  </text>

  <!-- Location & availability -->
  <text x="180" y="180" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#6e7681">📍 San Francisco Bay Area</text>
  <text x="180" y="200" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#3fb950">● Open to collaborations &amp; roles</text>

  <!-- Bottom gradient bar -->
  <rect x="0" y="270" width="800" height="2" fill="url(#txtGrad)">
    <animate attributeName="width" values="0;800" dur="1.2s" fill="freeze"/>
  </rect>

  <!-- Floating sparkles -->
  <g fill="#58a6ff">
    <circle cx="220" cy="70" r="1.5"><animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="310" cy="50" r="1.2"><animate attributeName="opacity" values="0;1;0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="80" r="1.4"><animate attributeName="opacity" values="0;1;0" dur="3.5s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="60" r="1.6"><animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="690" cy="100" r="1.3"><animate attributeName="opacity" values="0;1;0" dur="3.2s" begin="2s" repeatCount="indefinite"/></circle>
  </g>
</svg>
