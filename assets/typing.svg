<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 64" width="600" height="64" role="img" aria-label="Terminal typing">
  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, set, animateTransform { display: none !important; }
      * { opacity: 1 !important; }
    }
  </style>
  <rect width="600" height="64" fill="#0a0e1a" rx="10"/>
  <rect x="0" y="0" width="600" height="64" rx="10" fill="none" stroke="#1a2238" stroke-width="1"/>

  <!-- Terminal dots -->
  <circle cx="18" cy="16" r="4" fill="#f59e0b" opacity="0.8"/>
  <circle cx="32" cy="16" r="4" fill="#818cf8" opacity="0.6"/>
  <circle cx="46" cy="16" r="4" fill="#34d399" opacity="0.5"/>

  <!-- Prompt -->
  <text x="20" y="48" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16" font-weight="600">
    <tspan fill="#f59e0b">&gt; </tspan><tspan fill="#e2e8f0">
      <tspan>t</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="0.08s"/>r</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="0.16s"/>a</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="0.24s"/>i</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="0.32s"/>n</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="0.40s"/>_</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="0.48s"/>m</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="0.56s"/>o</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="0.64s"/>d</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="0.72s"/>e</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="0.80s"/>l</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="0.88s"/>.</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="0.96s"/>f</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="1.04s"/>i</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="1.12s"/>t</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="1.20s"/>(</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="1.28s"/>)</tspan>
      <tspan fill="#64748b" opacity="0"><set attributeName="opacity" to="1" begin="1.4s"/>  # running locally, zero API keys</tspan>
    </tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="325" y="36" width="8" height="18" fill="#f59e0b" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
