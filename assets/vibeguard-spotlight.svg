<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="100%" height="auto" role="img" aria-label="VibeGuard spotlight">
  <defs>
    <linearGradient id="vgBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1e"/><stop offset="100%" stop-color="#0b1224"/>
    </linearGradient>
    <linearGradient id="vgAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="vgLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <filter id="vgFilter" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="vgFrame"><rect width="900" height="380" rx="14"/></clipPath>
  </defs>
  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform { display: none !important; }
      * { opacity: 1 !important; }
    }
    .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
    .sans { font-family: "Segoe UI", Inter, ui-sans-serif, system-ui, sans-serif; }
  </style>

  <g clip-path="url(#vgFrame)">
    <rect width="900" height="380" fill="url(#vgBg)"/>
    <rect width="900" height="380" rx="14" fill="none" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.3">
      <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="0" width="4" height="380" rx="2" fill="#34d399"/>
    <circle cx="700" cy="60" r="80" fill="url(#vgGlow)">
      <animate attributeName="r" values="70;90;70" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- Header -->
    <text x="24" y="36" class="mono" font-size="11" fill="#34d399" font-weight="600" letter-spacing="2">FEATURED PROJECT</text>
    <rect x="24" y="46" width="852" height="1" fill="#1b2340"/>

    <!-- Shield icon + title -->
    <g transform="translate(24,60)">
      <circle cx="20" cy="22" r="24" fill="none" stroke="#34d399" stroke-width="1" opacity="0">
        <animate attributeName="r" values="20;36" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <g filter="url(#vgFilter)">
        <path d="M20,2 L36,8 V20 C36,30 28,38 20,42 C12,38 4,30 4,20 V8 Z" fill="none" stroke="#34d399" stroke-width="2"/>
        <path d="M14,22 L18,27 L27,16" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <animate attributeName="stroke-dasharray" values="0,30;30,0" dur="3s" repeatCount="indefinite"/>
        </path>
      </g>
    </g>
    <text x="68" y="90" class="sans" font-size="26" font-weight="800" fill="#e2e8f0">VibeGuard</text>
    <text x="200" y="90" class="mono" font-size="12" fill="#34d399" opacity="0.7">v1.3.0</text>
    <text x="24" y="112" class="sans" font-size="14" fill="#64748b">Free security &amp; privacy scanner for AI-coded apps — 100% offline, zero telemetry</text>

    <!-- Key metrics row -->
    <g transform="translate(24,126)">
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.1s" fill="freeze"/>
        <rect width="200" height="44" rx="8" fill="#0b0f1e" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.35"/>
        <text x="14" y="20" class="mono" font-size="18" font-weight="800" fill="#22d3ee">764</text>
        <text x="14" y="36" class="sans" font-size="10" fill="#64748b">security rules</text>
      </g>

      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.25s" fill="freeze"/>
        <rect x="210" width="200" height="44" rx="8" fill="#0b0f1e" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.35"/>
        <text x="224" y="20" class="mono" font-size="18" font-weight="800" fill="#a78bfa">82</text>
        <text x="224" y="36" class="sans" font-size="10" fill="#64748b">MCP tools</text>
      </g>

      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.4s" fill="freeze"/>
        <rect x="420" width="200" height="44" rx="8" fill="#0b0f1e" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.35"/>
        <text x="434" y="20" class="mono" font-size="18" font-weight="800" fill="#fbbf24">18</text>
        <text x="434" y="36" class="sans" font-size="10" fill="#64748b">languages scanned</text>
      </g>

      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.55s" fill="freeze"/>
        <rect x="630" width="218" height="44" rx="8" fill="#0b0f1e" stroke="#f472b6" stroke-width="1" stroke-opacity="0.35"/>
        <text x="644" y="20" class="mono" font-size="18" font-weight="800" fill="#f472b6">89.1%</text>
        <text x="644" y="36" class="sans" font-size="10" fill="#64748b">F1 benchmark score</text>
      </g>
    </g>

    <!-- Left: what it catches -->
    <g transform="translate(24,190)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.3s" fill="freeze"/>
      <text x="0" y="0" class="mono" font-size="10" fill="#22d3ee" font-weight="600" letter-spacing="2">WHAT IT CATCHES</text>
      <rect x="0" y="8" width="410" height="1" fill="#1b2340"/>

      <text x="0" y="28" class="sans" font-size="12" fill="#94a3b8"><tspan fill="#f85149">●</tspan>  Leaked API keys (50+ types — Stripe, AWS, OpenAI)</text>
      <text x="0" y="46" class="sans" font-size="12" fill="#94a3b8"><tspan fill="#f85149">●</tspan>  SQL injection via AST taint analysis</text>
      <text x="0" y="64" class="sans" font-size="12" fill="#94a3b8"><tspan fill="#fbbf24">●</tspan>  Prompt injection in system prompts</text>
      <text x="0" y="82" class="sans" font-size="12" fill="#94a3b8"><tspan fill="#fbbf24">●</tspan>  Uncapped agent loops (infinite API spend)</text>
      <text x="0" y="100" class="sans" font-size="12" fill="#94a3b8"><tspan fill="#a78bfa">●</tspan>  LLM output reaching exec/eval (RCE)</text>
      <text x="0" y="118" class="sans" font-size="12" fill="#94a3b8"><tspan fill="#a78bfa">●</tspan>  MCP server poisoning &amp; rug-pull detection</text>
      <text x="0" y="136" class="sans" font-size="12" fill="#94a3b8"><tspan fill="#34d399">●</tspan>  Open Supabase/Firebase databases (missing RLS)</text>
      <text x="0" y="154" class="sans" font-size="12" fill="#94a3b8"><tspan fill="#34d399">●</tspan>  XSS via dangerouslySetInnerHTML</text>
    </g>

    <!-- Right: features grid -->
    <g transform="translate(460,190)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.5s" fill="freeze"/>
      <text x="0" y="0" class="mono" font-size="10" fill="#a78bfa" font-weight="600" letter-spacing="2">CAPABILITIES</text>
      <rect x="0" y="8" width="388" height="1" fill="#1b2340"/>

      <!-- 2x4 grid -->
      <g transform="translate(0,20)">
        <rect width="186" height="32" rx="6" fill="#0b0f1e" stroke="#1b2340" stroke-width="0.8"/>
        <text x="12" y="21" class="sans" font-size="11" fill="#94a3b8">🤖  Agent action firewall</text>

        <rect x="202" width="186" height="32" rx="6" fill="#0b0f1e" stroke="#1b2340" stroke-width="0.8"/>
        <text x="214" y="21" class="sans" font-size="11" fill="#94a3b8">🧱  AI prompt firewall</text>

        <rect y="40" width="186" height="32" rx="6" fill="#0b0f1e" stroke="#1b2340" stroke-width="0.8"/>
        <text x="12" y="61" class="sans" font-size="11" fill="#94a3b8">🌐  Local MITM proxy</text>

        <rect x="202" y="40" width="186" height="32" rx="6" fill="#0b0f1e" stroke="#1b2340" stroke-width="0.8"/>
        <text x="214" y="61" class="sans" font-size="11" fill="#94a3b8">🪝  Pre-commit hooks</text>

        <rect y="80" width="186" height="32" rx="6" fill="#0b0f1e" stroke="#1b2340" stroke-width="0.8"/>
        <text x="12" y="101" class="sans" font-size="11" fill="#94a3b8">📋  10 compliance frameworks</text>

        <rect x="202" y="80" width="186" height="32" rx="6" fill="#0b0f1e" stroke="#1b2340" stroke-width="0.8"/>
        <text x="214" y="101" class="sans" font-size="11" fill="#94a3b8">🔗  15 AI client integrations</text>

        <rect y="120" width="186" height="32" rx="6" fill="#0b0f1e" stroke="#1b2340" stroke-width="0.8"/>
        <text x="12" y="141" class="sans" font-size="11" fill="#94a3b8">⚡  Auto-fix 43+ rule types</text>

        <rect x="202" y="120" width="186" height="32" rx="6" fill="#0b0f1e" stroke="#1b2340" stroke-width="0.8"/>
        <text x="214" y="141" class="sans" font-size="11" fill="#94a3b8">🚀  CI/CD for 7 providers</text>
      </g>
    </g>

    <!-- Install command bar -->
    <g transform="translate(24,360)">
      <rect width="852" height="0" rx="6" fill="#0b0f1e" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.4"/>
    </g>

    <!-- Bottom accent -->
    <rect x="24" y="372" width="852" height="2" rx="1" fill="url(#vgLine)" opacity="0.2"/>
  </g>
</svg>
