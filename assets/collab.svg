<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="100%" height="auto" role="img" aria-label="Connect with Yagyesh">
  <defs>
    <linearGradient id="cBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1e"/><stop offset="100%" stop-color="#0b1224"/>
    </linearGradient>
    <linearGradient id="cLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ghG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/><stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="liG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#0a66c2"/>
    </linearGradient>
    <linearGradient id="npmG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6"/><stop offset="100%" stop-color="#cb3837"/>
    </linearGradient>
    <filter id="cGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cFrame"><rect width="900" height="240" rx="14"/></clipPath>
  </defs>
  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform { display: none !important; }
      * { opacity: 1 !important; }
    }
    .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
    .sans { font-family: "Segoe UI", Inter, ui-sans-serif, system-ui, sans-serif; }
  </style>

  <g clip-path="url(#cFrame)">
    <rect width="900" height="240" fill="url(#cBg)"/>
    <rect width="900" height="240" rx="14" fill="none" stroke="#1b2340" stroke-width="1.5"/>

    <!-- Header -->
    <text x="24" y="36" class="mono" font-size="13" fill="#34d399" font-weight="600" letter-spacing="2">LET'S CONNECT</text>
    <text x="160" y="36" class="mono" font-size="10" fill="#475569">// open to roles, consulting &amp; collaboration</text>
    <rect x="24" y="46" width="852" height="1" fill="#1b2340"/>

    <!-- Available badge -->
    <g transform="translate(24,62)">
      <rect width="170" height="30" rx="15" fill="#0b1224" stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
      <circle cx="16" cy="15" r="4" fill="#34d399">
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="16" cy="15" r="4" fill="none" stroke="#34d399" stroke-width="1">
        <animate attributeName="r" values="4;9;4" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="28" y="19" class="sans" font-size="12" fill="#34d399" font-weight="600">Available now</text>
    </g>

    <!-- ============ 3 CARDS ============ -->

    <!-- GitHub -->
    <a href="https://github.com/yagyeshVyas">
      <g transform="translate(24,108)" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.2s" fill="freeze"/>
        <rect width="270" height="110" rx="12" fill="#0b1224" stroke="#1b2340" stroke-width="1"/>
        <!-- Accent top bar -->
        <rect x="0" y="0" width="270" height="3" rx="1.5" fill="url(#ghG)"/>
        <!-- Icon -->
        <g transform="translate(20,20)" filter="url(#cGlow)">
          <circle cx="20" cy="20" r="18" fill="#0b0f1e" stroke="#e2e8f0" stroke-width="1.5"/>
          <path d="M12 22a8 8 0 0 0 16 0c0-3.8-2.6-7-6.2-8 .2.4.3.9.3 1.4 0 1.6-.6 3-1.7 4.1.3.2.6.4 1 .4 1.2.8 2 2.2 2 3.8 0 .8-.2 1.5-.5 2.2.8-.2 1.5-.6 2.1-1.1-.4 1.4-1.6 2.5-3 2.8-.3 1.2-1.4 2-2.7 2-.6 0-1.2-.2-1.6-.5-.5.3-1.1.5-1.7.5-1.4 0-2.5-.9-2.8-2.1-1.5-.3-2.6-1.5-3-2.9.6.5 1.3.9 2.1 1.1-.3-.7-.5-1.4-.5-2.2 0-1.6.8-3 2-3.8-1.1-1.1-1.7-2.5-1.7-4.1 0-.5.1-1 .3-1.4-1.6.9-2.8 2.4-3.3 4.2Z" fill="#e2e8f0" transform="scale(0.7) translate(5,3)"/>
        </g>
        <text x="66" y="36" class="sans" font-size="16" font-weight="700" fill="#e2e8f0">GitHub</text>
        <text x="66" y="54" class="mono" font-size="11" fill="#64748b">@yagyeshVyas</text>
        <!-- Stats -->
        <line x1="20" y1="66" x2="250" y2="66" stroke="#1b2340" stroke-width="0.8"/>
        <text x="20" y="84" class="mono" font-size="10" fill="#94a3b8">10 repos</text>
        <text x="100" y="84" class="mono" font-size="10" fill="#fbbf24">★ 118</text>
        <text x="160" y="84" class="mono" font-size="10" fill="#a78bfa">⑂ 18</text>
        <text x="240" y="84" class="mono" font-size="12" fill="#22d3ee" text-anchor="end">→</text>
        <!-- Hover glow -->
        <rect x="0" y="0" width="270" height="110" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1" opacity="0">
          <animate attributeName="opacity" values="0;0.4;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
        </rect>
      </g>
    </a>

    <!-- LinkedIn -->
    <a href="https://linkedin.com/in/yagyeshVyas">
      <g transform="translate(315,108)" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.4s" fill="freeze"/>
        <rect width="270" height="110" rx="12" fill="#0b1224" stroke="#1b2340" stroke-width="1"/>
        <rect x="0" y="0" width="270" height="3" rx="1.5" fill="url(#liG)"/>
        <!-- Icon -->
        <g transform="translate(20,20)" filter="url(#cGlow)">
          <circle cx="20" cy="20" r="18" fill="#0b0f1e" stroke="#22d3ee" stroke-width="1.5"/>
          <text x="20" y="27" class="sans" font-size="18" font-weight="800" fill="#22d3ee" text-anchor="middle">in</text>
        </g>
        <text x="66" y="36" class="sans" font-size="16" font-weight="700" fill="#e2e8f0">LinkedIn</text>
        <text x="66" y="54" class="mono" font-size="11" fill="#64748b">/in/yagyeshVyas</text>
        <line x1="20" y1="66" x2="250" y2="66" stroke="#1b2340" stroke-width="0.8"/>
        <text x="20" y="84" class="sans" font-size="10" fill="#94a3b8">AI/ML Engineer</text>
        <text x="130" y="84" class="sans" font-size="10" fill="94a3b8">San Francisco</text>
        <text x="240" y="84" class="mono" font-size="12" fill="#a78bfa" text-anchor="end">→</text>
        <rect x="0" y="0" width="270" height="110" rx="12" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0">
          <animate attributeName="opacity" values="0;0.4;0" dur="3s" begin="1.2s" repeatCount="indefinite"/>
        </rect>
      </g>
    </a>

    <!-- npm -->
    <a href="https://www.npmjs.com/~yagyeshvyas">
      <g transform="translate(606,108)" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.6s" fill="freeze"/>
        <rect width="270" height="110" rx="12" fill="#0b1224" stroke="#1b2340" stroke-width="1"/>
        <rect x="0" y="0" width="270" height="3" rx="1.5" fill="url(#npmG)"/>
        <!-- Icon -->
        <g transform="translate(20,20)" filter="url(#cGlow)">
          <rect x="6" y="6" width="28" height="28" rx="4" fill="#0b0f1e" stroke="#f472b6" stroke-width="1.5"/>
          <rect x="12" y="12" width="5" height="16" fill="#f472b6"/>
          <rect x="19" y="12" width="5" height="16" fill="#f472b6" opacity="0.7"/>
          <rect x="26" y="12" width="5" height="10" fill="#f472b6" opacity="0.5"/>
        </g>
        <text x="66" y="36" class="sans" font-size="16" font-weight="700" fill="#e2e8f0">npm</text>
        <text x="66" y="54" class="mono" font-size="11" fill="#64748b">~yagyeshvyas</text>
        <line x1="20" y1="66" x2="250" y2="66" stroke="#1b2340" stroke-width="0.8"/>
        <text x="20" y="84" class="mono" font-size="10" fill="#94a3b8">@yagyeshvyas/vibeguard</text>
        <text x="240" y="84" class="mono" font-size="12" fill="#f472b6" text-anchor="end">→</text>
        <rect x="0" y="0" width="270" height="110" rx="12" fill="none" stroke="#f472b6" stroke-width="1" opacity="0">
          <animate attributeName="opacity" values="0;0.4;0" dur="3s" begin="1.8s" repeatCount="indefinite"/>
        </rect>
      </g>
    </a>

    <!-- Bottom line -->
    <rect x="24" y="230" width="852" height="2" rx="1" fill="url(#cLine)" opacity="0.2"/>
  </g>
</svg>
