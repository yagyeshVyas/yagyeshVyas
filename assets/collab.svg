<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="100%" height="auto" role="img" aria-label="Work with me">
  <defs>
    <linearGradient id="colBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1e"/><stop offset="100%" stop-color="#0b1224"/>
    </linearGradient>
    <linearGradient id="colLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="colFrame"><rect width="900" height="340" rx="14"/></clipPath>
  </defs>
  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform { display: none !important; }
      * { opacity: 1 !important; }
    }
    .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
    .sans { font-family: "Segoe UI", Inter, ui-sans-serif, system-ui, sans-serif; }
  </style>

  <g clip-path="url(#colFrame)">
    <rect width="900" height="340" fill="url(#colBg)"/>
    <rect width="900" height="340" rx="14" fill="none" stroke="#1b2340" stroke-width="1.5"/>

    <!-- Header -->
    <text x="24" y="36" class="mono" font-size="13" fill="#34d399" font-weight="600" letter-spacing="2">WORK WITH ME</text>
    <text x="160" y="36" class="mono" font-size="10" fill="#475569">// open to collaboration, consulting &amp; full-time roles</text>
    <rect x="24" y="46" width="852" height="1" fill="#1b2340"/>

    <!-- ============ LEFT: availability & info ============ -->
    <g transform="translate(24,64)">
      <!-- Status banner -->
      <rect width="410" height="56" rx="12" fill="#0b1224" stroke="#34d399" stroke-width="1" stroke-opacity="0.4"/>
      <circle cx="28" cy="28" r="8" fill="#34d399" opacity="0.2">
        <animate attributeName="r" values="8;14;8" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0;0.2" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="28" cy="28" r="6" fill="#34d399">
        <animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <text x="48" y="26" class="sans" font-size="14" font-weight="700" fill="#e2e8f0">Available now</text>
      <text x="48" y="42" class="sans" font-size="11" fill="#34d399">Open to new projects · Q3 2026</text>

      <!-- Info rows -->
      <g transform="translate(0,76)">
        <text x="0" y="14" class="mono" font-size="10" fill="#475569" letter-spacing="2">DETAILS</text>
        <line x1="0" y1="20" x2="410" y2="20" stroke="#1b2340" stroke-width="1"/>
      </g>

      <!-- Location -->
      <g transform="translate(0,108)">
        <text x="0" y="14" font-size="14">📍</text>
        <text x="24" y="14" class="sans" font-size="12" fill="#64748b">Location</text>
        <text x="410" y="14" class="mono" font-size="12" fill="#e2e8f0" text-anchor="end">San Francisco · PST</text>
      </g>

      <!-- Response -->
      <g transform="translate(0,132)">
        <text x="0" y="14" font-size="14">⏱️</text>
        <text x="24" y="14" class="sans" font-size="12" fill="#64748b">Response time</text>
        <text x="410" y="14" class="mono" font-size="12" fill="#e2e8f0" text-anchor="end">~ 4 hours</text>
      </g>

      <!-- Experience -->
      <g transform="translate(0,156)">
        <text x="0" y="14" font-size="14">🎯</text>
        <text x="24" y="14" class="sans" font-size="12" fill="#64748b">Focus</text>
        <text x="410" y="14" class="mono" font-size="12" fill="#e2e8f0" text-anchor="end">AI/ML · LLMs · 3+ yrs</text>
      </g>

      <!-- Collaboration style -->
      <g transform="translate(0,180)">
        <text x="0" y="14" font-size="14">🤝</text>
        <text x="24" y="14" class="sans" font-size="12" fill="#64748b">Style</text>
        <text x="410" y="14" class="mono" font-size="12" fill="#e2e8f0" text-anchor="end">Async-first · deep work</text>
      </g>

      <!-- What I'm looking for -->
      <g transform="translate(0,216)">
        <text x="0" y="14" class="mono" font-size="10" fill="#475569" letter-spacing="2">OPEN TO</text>
        <line x1="0" y1="20" x2="410" y2="20" stroke="#1b2340" stroke-width="1"/>
      </g>

      <g transform="translate(0,236)" class="mono" font-size="11" fill="#94a3b8">
        <text x="0" y="0">✦</text><text x="16" y="0" fill="#e2e8f0">Full-time AI/ML engineering roles</text>
        <text x="0" y="20">✦</text><text x="16" y="20" fill="#e2e8f0">Consulting on RAG / LLM pipelines</text>
        <text x="0" y="40">✦</text><text x="16" y="40" fill="#e2e8f0">Open-source collaboration</text>
      </g>
    </g>

    <!-- ============ RIGHT: contact channels ============ -->
    <g transform="translate(460,64)">
      <text x="0" y="14" class="mono" font-size="10" fill="#475569" letter-spacing="2">REACH ME</text>
      <line x1="0" y1="20" x2="416" y2="20" stroke="#1b2340" stroke-width="1"/>

      <!-- GitHub -->
      <g transform="translate(0,36)" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.3s" fill="freeze"/>
        <rect width="416" height="48" rx="10" fill="#0b1224" stroke="#1b2340" stroke-width="1"/>
        <rect x="0" y="0" width="3" height="48" rx="1.5" fill="#e2e8f0"/>
        <text x="20" y="30" font-size="18">🐙</text>
        <text x="48" y="22" class="sans" font-size="13" font-weight="600" fill="#e2e8f0">GitHub</text>
        <text x="48" y="36" class="mono" font-size="10" fill="#64748b">@yagyeshVyas</text>
        <text x="400" y="30" class="mono" font-size="10" fill="#22d3ee" text-anchor="end">→</text>
        <circle cx="404" cy="24" r="3" fill="#34d399">
          <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- LinkedIn -->
      <g transform="translate(0,92)" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.5s" fill="freeze"/>
        <rect width="416" height="48" rx="10" fill="#0b1224" stroke="#1b2340" stroke-width="1"/>
        <rect x="0" y="0" width="3" height="48" rx="1.5" fill="#22d3ee"/>
        <text x="20" y="30" font-size="18">💼</text>
        <text x="48" y="22" class="sans" font-size="13" font-weight="600" fill="#e2e8f0">LinkedIn</text>
        <text x="48" y="36" class="mono" font-size="10" fill="#64748b">/in/yagyeshVyas</text>
        <text x="400" y="30" class="mono" font-size="10" fill="#a78bfa" text-anchor="end">→</text>
      </g>

      <!-- Twitter -->
      <g transform="translate(0,148)" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.7s" fill="freeze"/>
        <rect width="416" height="48" rx="10" fill="#0b1224" stroke="#1b2340" stroke-width="1"/>
        <rect x="0" y="0" width="3" height="48" rx="1.5" fill="#a78bfa"/>
        <text x="20" y="30" font-size="18">🐦</text>
        <text x="48" y="22" class="sans" font-size="13" font-weight="600" fill="#e2e8f0">Twitter / X</text>
        <text x="48" y="36" class="mono" font-size="10" fill="#64748b">@yagyeshVyas</text>
        <text x="400" y="30" class="mono" font-size="10" fill="#f472b6" text-anchor="end">→</text>
      </g>

      <!-- Website -->
      <g transform="translate(0,204)" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.9s" fill="freeze"/>
        <rect width="416" height="48" rx="10" fill="#0b1224" stroke="#1b2340" stroke-width="1"/>
        <rect x="0" y="0" width="3" height="48" rx="1.5" fill="#f472b6"/>
        <text x="20" y="30" font-size="18">🌐</text>
        <text x="48" y="22" class="sans" font-size="13" font-weight="600" fill="#e2e8f0">Website</text>
        <text x="48" y="36" class="mono" font-size="10" fill="#64748b">yagyesh.dev</text>
        <text x="400" y="30" class="mono" font-size="10" fill="#fbbf24" text-anchor="end">→</text>
      </g>

      <!-- Email -->
      <g transform="translate(0,260)" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.1s" fill="freeze"/>
        <rect width="416" height="48" rx="10" fill="#0b1224" stroke="#1b2340" stroke-width="1"/>
        <rect x="0" y="0" width="3" height="48" rx="1.5" fill="#fbbf24"/>
        <text x="20" y="30" font-size="18">✉️</text>
        <text x="48" y="22" class="sans" font-size="13" font-weight="600" fill="#e2e8f0">Email</text>
        <text x="48" y="36" class="mono" font-size="10" fill="#64748b">hello@yagyesh.dev</text>
        <text x="400" y="30" class="mono" font-size="10" fill="#34d399" text-anchor="end">→</text>
      </g>
    </g>
  </g>
</svg>
