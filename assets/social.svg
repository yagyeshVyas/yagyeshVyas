<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 90" width="500" height="90" role="img" aria-label="Social links">
  <style>
    .pulse { animation: breathe 3.5s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .s1 { animation-delay: 0s; }
    .s2 { animation-delay: 0.7s; }
    .s3 { animation-delay: 1.4s; }
    .s4 { animation-delay: 2.1s; }
    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) { .pulse { animation: none; opacity: 1; } }
  </style>
  <rect width="500" height="90" fill="#0a0e1a" rx="12"/>
  <rect width="500" height="90" rx="12" fill="none" stroke="#1a2238" stroke-width="1"/>

  <text x="250" y="20" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="2">CONNECT</text>

  <!-- GitHub -->
  <a href="https://github.com/yagyeshVyas">
    <g class="pulse s1" transform="translate(80,30)">
      <circle cx="20" cy="20" r="18" fill="#121829" stroke="#e2e8f0" stroke-width="1.2"/>
      <path d="M12 20a8 8 0 0 0 16 0c0-3.5-2.3-6.5-5.5-7.6.1.3.2.7.2 1 0 1.1-.4 2.1-1.1 2.9.3.7.4 1.4.4 2.1 0 2-1.6 3.6-3.6 3.6-1.3 0-2.5-.7-3.1-1.7-.7.7-1.7 1.1-2.8 1.1-.7 0-1.4-.2-2-.5 0 2 1.4 3.7 3.3 4.3-.4.4-.6.9-.6 1.5 0 1 .7 1.9 1.7 2.2-.3.5-.8.8-1.4.8-1.1 0-2-.8-2.2-1.7-1.1-.3-1.8-1.2-1.8-2.2 0-.5.2-.9.4-1.2-.4-.7-.7-1.6-.7-2.5 0-.8.2-1.5.4-2.1-.7-.8-1.1-1.8-1.1-2.9 0-.4.1-.7.2-1C14.3 13.5 12 16.5 12 20Z" fill="#e2e8f0" transform="scale(0.55) translate(10,8)"/>
      <text x="20" y="48" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b" text-anchor="middle">github</text>
    </g>
  </a>

  <!-- LinkedIn -->
  <a href="https://linkedin.com/in/yagyeshVyas">
    <g class="pulse s2" transform="translate(190,30)">
      <circle cx="20" cy="20" r="18" fill="#121829" stroke="#0a66c2" stroke-width="1.2"/>
      <text x="20" y="27" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#0a66c2" text-anchor="middle">in</text>
      <text x="20" y="48" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b" text-anchor="middle">linkedin</text>
    </g>
  </a>

  <!-- Twitter/X -->
  <a href="https://twitter.com/yagyeshVyas">
    <g class="pulse s3" transform="translate(300,30)">
      <circle cx="20" cy="20" r="18" fill="#121829" stroke="#e2e8f0" stroke-width="1.2"/>
      <path d="M14 14l5 6.5L14 27h2.5l3.5-4 3 4h3l-5.5-7L25 14h-2.5l-3 3.5L16 14h-2Z" fill="#e2e8f0" transform="scale(0.7) translate(8,5)"/>
      <text x="20" y="48" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b" text-anchor="middle">twitter</text>
    </g>
  </a>

  <!-- Website -->
  <a href="https://yagyesh.dev">
    <g class="pulse s4" transform="translate(410,30)">
      <circle cx="20" cy="20" r="18" fill="#121829" stroke="#34d399" stroke-width="1.2"/>
      <circle cx="20" cy="20" r="7" fill="none" stroke="#34d399" stroke-width="1.5"/>
      <path d="M13 20h14M20 13v14" stroke="#34d399" stroke-width="1.2"/>
      <ellipse cx="20" cy="20" rx="10" ry="4" fill="none" stroke="#34d399" stroke-width="0.8" opacity="0.5"/>
      <text x="20" y="48" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b" text-anchor="middle">website</text>
    </g>
  </a>
</svg>
