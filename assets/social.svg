<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 80" width="500" height="80" role="img" aria-label="Social links">
  <style>
    .icon { animation: pulse 3s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .i1 { animation-delay: 0s; }
    .i2 { animation-delay: 0.5s; }
    .i3 { animation-delay: 1s; }
    .i4 { animation-delay: 1.5s; }
    .i5 { animation-delay: 2s; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.75; }
      50% { transform: scale(1.12); opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      .icon { animation: none; opacity: 1; }
    }
  </style>
  <rect width="500" height="80" fill="#0d1117" rx="12"/>

  <!-- GitHub -->
  <a href="https://github.com/yagyeshVyas">
    <g class="icon i1" transform="translate(40,16)">
      <circle cx="24" cy="24" r="22" fill="#21262d" stroke="#e6edf3" stroke-width="1.5"/>
      <path d="M12 24a12 12 0 0 0 24 0c0-5.3-3.4-9.8-8.2-11.4.2.5.3 1 .3 1.6 0 1.7-.6 3.2-1.6 4.4.4 1 .6 2 .6 3.2 0 1.4-.4 2.7-1 3.8.4.5.6 1.1.6 1.8 0 1.5-1 2.8-2.6 3.2-.2 1.4-1.5 2.6-3.2 2.6-.7 0-1.4-.2-1.9-.6-.5.4-1.2.6-1.9.6-1.7 0-3-1.2-3.2-2.6-1.6-.4-2.6-1.7-2.6-3.2 0-.7.2-1.3.6-1.8-.6-1.1-1-2.4-1-3.8 0-1.2.2-2.2.6-3.2-1-1.2-1.6-2.7-1.6-4.4 0-.6.1-1.1.3-1.6C15.4 14.2 12 18.7 12 24Z" fill="#e6edf3" transform="scale(0.7) translate(10,5)"/>
      <text x="24" y="55" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">GitHub</text>
    </g>
  </a>

  <!-- LinkedIn -->
  <a href="https://linkedin.com/in/yagyeshVyas">
    <g class="icon i2" transform="translate(130,16)">
      <circle cx="24" cy="24" r="22" fill="#21262d" stroke="#0a66c2" stroke-width="1.5"/>
      <text x="24" y="33" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800" fill="#0a66c2" text-anchor="middle">in</text>
      <text x="24" y="55" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">LinkedIn</text>
    </g>
  </a>

  <!-- Twitter/X -->
  <a href="https://twitter.com/yagyeshVyas">
    <g class="icon i3" transform="translate(220,16)">
      <circle cx="24" cy="24" r="22" fill="#21262d" stroke="#e6edf3" stroke-width="1.5"/>
      <path d="M16 16l7 9.5L16 35h3l5.5-6 4.5 6h4l-7.5-10L33 16h-3l-5 5.5L21 16h-5Z" fill="#e6edf3" transform="scale(0.7) translate(10,5)"/>
      <text x="24" y="55" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Twitter</text>
    </g>
  </a>

  <!-- Website -->
  <a href="https://yagyesh.dev">
    <g class="icon i4" transform="translate(310,16)">
      <circle cx="24" cy="24" r="22" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
      <circle cx="24" cy="24" r="9" fill="none" stroke="#3fb950" stroke-width="1.8"/>
      <path d="M15 24h18M24 15v18" stroke="#3fb950" stroke-width="1.5"/>
      <ellipse cx="24" cy="24" rx="13" ry="5" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.6"/>
      <text x="24" y="55" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Website</text>
    </g>
  </a>

  <!-- Email -->
  <a href="mailto:hello@yagyesh.dev">
    <g class="icon i5" transform="translate(400,16)">
      <circle cx="24" cy="24" r="22" fill="#21262d" stroke="#d29922" stroke-width="1.5"/>
      <rect x="13" y="18" width="22" height="14" rx="2" fill="none" stroke="#d29922" stroke-width="1.5"/>
      <path d="M13 18l11 8 11-8" fill="none" stroke="#d29922" stroke-width="1.5"/>
      <text x="24" y="55" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Email</text>
