<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 195" width="440" height="195" role="img" aria-label="Contribution streak">
  <style>@media (prefers-reduced-motion: reduce) {
  animate, animateTransform { display: none !important; }
  * { opacity: 1 !important; }
}</style>
  <defs>
    <linearGradient id="strG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="hgK" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/><stop offset="50%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <filter id="kglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="440" height="195" rx="14" fill="#0b0f1e"/>
  <rect width="440" height="195" rx="14" fill="none" stroke="#1b2340" stroke-width="1.5"/>
  <text x="26" y="38" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="13" fill="#f472b6" font-weight="600" letter-spacing="2">STREAK</text>
  <rect x="26" y="50" width="388" height="1.5" fill="url(#hgK)" opacity="0.5"/>

  <!-- left: total -->
  <g text-anchor="middle" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.3s" fill="freeze"/>
    <text x="82" y="112" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="26" font-weight="800" fill="#e2e8f0">185</text>
    <text x="82" y="134" font-family="'Segoe UI', Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#94a3b8">Contributions</text>
    <text x="82" y="150" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#475569">since 09/11</text>
  </g>

  <!-- center: current streak ring -->
  <g transform="translate(220,118)">
    <circle r="56" fill="none" stroke="#1b2340" stroke-width="6"/>
    <circle r="56" fill="none" stroke="url(#strG)" stroke-width="6" stroke-linecap="round"
      stroke-dasharray="351.9" stroke-dashoffset="351.9" transform="rotate(-90)">
      <animate attributeName="stroke-dashoffset" values="351.9;21.1" dur="1.6s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1"/>
    </circle>
    <circle r="62" fill="none" stroke="#f472b6" stroke-width="1" stroke-dasharray="2 10" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="16s" repeatCount="indefinite"/>
    </circle>
    <text y="-2" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="34" font-weight="800" fill="#e2e8f0" text-anchor="middle" opacity="0">5
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.8s" fill="freeze"/>
    </text>
    <text y="20" font-family="'Segoe UI', Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#f472b6" text-anchor="middle" font-weight="600" opacity="0">day streak
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1s" fill="freeze"/>
    </text>
    <text y="38" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#475569" text-anchor="middle" opacity="0">07/11 – 07/15
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.1s" fill="freeze"/>
    </text>
  </g>

  <!-- right: longest -->
  <g text-anchor="middle" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.5s" fill="freeze"/>
    <text x="358" y="112" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="26" font-weight="800" fill="#e2e8f0">5</text>
    <text x="358" y="134" font-family="'Segoe UI', Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#94a3b8">Longest streak</text>
    <text x="358" y="150" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#475569">07/11 – 07/15</text>
  </g>
</svg>