<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160" role="img" aria-label="Animated contribution graph">
  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform { display: none !important; }
    }
  </style>
  <rect width="720" height="160" fill="#0d1117" rx="12"/>
  <text x="16" y="24" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#e6edf3" font-weight="600">⚡ <tspan fill="#3fb950">2,948</tspan> contributions in the last year</text>
  <text x="610" y="24" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#6e7681">Less
    <tspan dx="6" fill="#161b22">■</tspan>
    <tspan dx="2" fill="#0e4429">■</tspan>
    <tspan dx="2" fill="#006d32">■</tspan>
    <tspan dx="2" fill="#26a641">■</tspan>
    <tspan dx="2" fill="#39d353">■</tspan>
    <tspan dx="6">More</tspan>
  </text>

  <!-- Month labels -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#6e7681">
    <text x="32" y="42">Jan</text>
    <text x="92" y="42">Feb</text>
    <text x="148" y="42">Mar</text>
    <text x="204" y="42">Apr</text>
    <text x="264" y="42">May</text>
    <text x="320" y="42">Jun</text>
    <text x="380" y="42">Jul</text>
    <text x="440" y="42">Aug</text>
    <text x="500" y="42">Sep</text>
    <text x="556" y="42">Oct</text>
    <text x="616" y="42">Nov</text>
    <text x="672" y="42">Dec</text>
  </g>

  <!-- Day labels -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#6e7681">
    <text x="6" y="68">Mon</text>
    <text x="6" y="96">Wed</text>
    <text x="6" y="124">Fri</text>
  </g>
