<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160" role="img" aria-label="Animated contribution heatmap">
  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform { display: none !important; }
    }
  </style>
  <rect width="720" height="160" fill="#0a0e1a" rx="12"/>
  <rect width="720" height="160" rx="12" fill="none" stroke="#1a2238" stroke-width="1"/>

  <text x="16" y="24" font-family="JetBrains Mono, monospace" font-size="12" fill="#f59e0b" font-weight="500">⚡ <tspan fill="#e2e8f0" font-weight="600">2,948</tspan> <tspan fill="#64748b">contributions this year</tspan></text>

  <text x="560" y="24" font-family="JetBrains Mono, monospace" font-size="9" fill="#475569">less
    <tspan dx="5" fill="#121829">■</tspan>
    <tspan dx="1" fill="#1e3a5f">■</tspan>
    <tspan dx="1" fill="#1e6b3a">■</tspan>
    <tspan dx="1" fill="#34d399">■</tspan>
    <tspan dx="1" fill="#f59e0b">■</tspan>
    <tspan dx="5">more</tspan>
  </text>

  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#475569">
    <text x="32" y="42">Jan</text>
    <text x="92" y="42">Feb</text>
    <text x="148" y="42">Mar</text>
    <text x="208" y="42">Apr</text>
    <text x="268" y="42">May</text>
    <text x="324" y="42">Jun</text>
    <text x="384" y="42">Jul</text>
    <text x="444" y="42">Aug</text>
    <text x="504" y="42">Sep</text>
    <text x="560" y="42">Oct</text>
    <text x="624" y="42">Nov</text>
    <text x="680" y="42">Dec</text>
  </g>

  <g font-family="JetBrains Mono, monospace" font-size="8" fill="#475569">
    <text x="6" y="68">Mon</text>
    <text x="6" y="96">Wed</text>
    <text x="6" y="124">Fri</text>
  </g>
