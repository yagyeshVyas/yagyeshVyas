<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="100%" height="auto" role="img" aria-label="Yagyesh's AI lab — animated scene">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0d1f"/>
      <stop offset="100%" stop-color="#05060f"/>
    </linearGradient>
    <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1030"/>
      <stop offset="100%" stop-color="#141b3d"/>
    </linearGradient>
    <linearGradient id="deskG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3352"/>
      <stop offset="100%" stop-color="#1b2340"/>
    </linearGradient>
    <linearGradient id="neonline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <filter id="lglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="lframe"><rect width="900" height="360" rx="16"/></clipPath>
    <clipPath id="scr1"><rect x="108" y="142" width="164" height="96" rx="4"/></clipPath>
    <clipPath id="scr2"><rect x="306" y="162" width="156" height="76" rx="4"/></clipPath>
    <clipPath id="winC"><rect x="648" y="48" width="204" height="150" rx="8"/></clipPath>
  </defs>

  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform, animateMotion { display: none !important; }
      * { opacity: 1 !important; }
    }
    .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
  </style>

  <g clip-path="url(#lframe)">
    <!-- Room -->
    <rect width="900" height="360" fill="url(#wall)"/>
    <rect width="900" height="360" rx="16" fill="none" stroke="#1b2340" stroke-width="1.5"/>
    <!-- floor -->
    <rect y="318" width="900" height="42" fill="#080b17"/>
    <line x1="0" y1="318" x2="900" y2="318" stroke="#233054" stroke-width="1"/>

    <!-- ======== WINDOW (night sky) ======== -->
    <g>
      <rect x="644" y="44" width="212" height="158" rx="10" fill="#080b17" stroke="#233054" stroke-width="2"/>
      <g clip-path="url(#winC)">
        <rect x="648" y="48" width="204" height="150" fill="url(#skyG)"/>
        <!-- moon -->
        <circle cx="800" cy="88" r="17" fill="#e2e8f0" opacity="0.9"/>
        <circle cx="793" cy="83" r="15" fill="url(#skyG)"/>
        <!-- stars -->
        <g fill="#e2e8f0">
          <circle cx="672" cy="70" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite"/></circle>
          <circle cx="705" cy="100" r="1.1"><animate attributeName="opacity" values="1;0.2;1" dur="3.6s" repeatCount="indefinite"/></circle>
          <circle cx="738" cy="66" r="1.3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" begin="0.7s" repeatCount="indefinite"/></circle>
          <circle cx="682" cy="140" r="1.2"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="3s" begin="0.4s" repeatCount="indefinite"/></circle>
          <circle cx="770" cy="130" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="4s" begin="1.1s" repeatCount="indefinite"/></circle>
          <circle cx="820" cy="150" r="1.2"><animate attributeName="opacity" values="1;0.3;1" dur="2.6s" begin="0.9s" repeatCount="indefinite"/></circle>
        </g>
        <!-- shooting star -->
        <line x1="0" y1="0" x2="34" y2="10" stroke="#e2e8f0" stroke-width="1.2" opacity="0">
          <animateMotion dur="6s" repeatCount="indefinite" path="M840,60 L680,120"/>
          <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.08;0.15;0.25;1" dur="6s" repeatCount="indefinite"/>
        </line>
      </g>
      <!-- window cross bars -->
      <line x1="750" y1="48" x2="750" y2="198" stroke="#233054" stroke-width="2"/>
      <line x1="648" y1="123" x2="852" y2="123" stroke="#233054" stroke-width="2"/>
    </g>

    <!-- ======== NEON SIGN ======== -->
    <g>
      <rect x="70" y="46" width="320" height="52" rx="12" fill="none" stroke="#f472b6" stroke-width="2" filter="url(#lglow)">
        <animate attributeName="stroke-opacity" values="1;1;0.35;1;1;0.55;1" keyTimes="0;0.4;0.45;0.5;0.8;0.85;1" dur="6s" repeatCount="indefinite"/>
      </rect>
      <text x="230" y="79" class="mono" font-size="20" font-weight="700" fill="#22d3ee" text-anchor="middle" letter-spacing="4" filter="url(#lglow)">
        YAGYESH • AI LAB
        <animate attributeName="fill-opacity" values="1;1;0.4;1;1;0.6;1" keyTimes="0;0.4;0.45;0.5;0.8;0.85;1" dur="6s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- ======== DESK ======== -->
    <rect x="60" y="252" width="520" height="14" rx="6" fill="url(#deskG)"/>
    <rect x="90" y="266" width="12" height="52" fill="#141b31"/>
    <rect x="530" y="266" width="12" height="52" fill="#141b31"/>

    <!-- ======== MONITOR 1 — code typing loop ======== -->
    <g>
      <rect x="100" y="134" width="180" height="112" rx="8" fill="#080b17" stroke="#233054" stroke-width="2"/>
      <rect x="182" y="246" width="16" height="8" fill="#141b31"/>
      <rect x="160" y="252" width="60" height="5" rx="2" fill="#141b31"/>
      <g clip-path="url(#scr1)">
        <!-- code lines: two passes cycling -->
        <g>
          <rect x="118" y="152" width="0" height="6" rx="3" fill="#a78bfa"><animate attributeName="width" values="0;92;92;92;0" keyTimes="0;0.08;0.5;0.98;1" dur="8s" repeatCount="indefinite"/></rect>
          <rect x="118" y="166" width="0" height="6" rx="3" fill="#22d3ee"><animate attributeName="width" values="0;0;120;120;0" keyTimes="0;0.08;0.16;0.98;1" dur="8s" repeatCount="indefinite"/></rect>
          <rect x="132" y="180" width="0" height="6" rx="3" fill="#34d399"><animate attributeName="width" values="0;0;74;74;0" keyTimes="0;0.16;0.24;0.98;1" dur="8s" repeatCount="indefinite"/></rect>
          <rect x="132" y="194" width="0" height="6" rx="3" fill="#f472b6"><animate attributeName="width" values="0;0;104;104;0" keyTimes="0;0.24;0.32;0.98;1" dur="8s" repeatCount="indefinite"/></rect>
          <rect x="118" y="208" width="0" height="6" rx="3" fill="#fbbf24"><animate attributeName="width" values="0;0;60;60;0" keyTimes="0;0.32;0.4;0.98;1" dur="8s" repeatCount="indefinite"/></rect>
          <rect x="118" y="222" width="0" height="6" rx="3" fill="#64748b"><animate attributeName="width" values="0;0;130;130;0" keyTimes="0;0.4;0.48;0.98;1" dur="8s" repeatCount="indefinite"/></rect>
        </g>
        <!-- cursor -->
        <rect x="118" y="230" width="7" height="3" fill="#22d3ee">
          <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
        </rect>
      </g>
      <!-- screen glow on desk -->
      <ellipse cx="190" cy="252" rx="80" ry="5" fill="#22d3ee" opacity="0.12">
        <animate attributeName="opacity" values="0.08;0.18;0.08" dur="3s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- ======== MONITOR 2 — training curve ======== -->
    <g>
      <rect x="298" y="154" width="172" height="92" rx="8" fill="#080b17" stroke="#233054" stroke-width="2"/>
      <rect x="374" y="246" width="16" height="8" fill="#141b31"/>
      <rect x="352" y="252" width="60" height="5" rx="2" fill="#141b31"/>
      <g clip-path="url(#scr2)">
        <text x="312" y="176" class="mono" font-size="8" fill="#475569">loss</text>
        <!-- axes -->
        <line x1="312" y1="228" x2="452" y2="228" stroke="#233054" stroke-width="1"/>
        <line x1="312" y1="168" x2="312" y2="228" stroke="#233054" stroke-width="1"/>
        <!-- descending loss curve draws + repeats -->
        <path d="M312,176 C340,180 352,206 376,214 C400,222 424,224 452,225" fill="none" stroke="#34d399" stroke-width="2"
              pathLength="1" stroke-dasharray="1" stroke-dashoffset="1">
          <animate attributeName="stroke-dashoffset" values="1;0;0;1" keyTimes="0;0.35;0.95;1" dur="7s" repeatCount="indefinite"/>
        </path>
        <!-- moving dot -->
        <circle r="3" fill="#34d399" filter="url(#lglow)">
          <animateMotion dur="7s" repeatCount="indefinite" keyPoints="0;1;1;0" keyTimes="0;0.35;0.95;1" calcMode="linear"
            path="M312,176 C340,180 352,206 376,214 C400,222 424,224 452,225"/>
          <animate attributeName="opacity" values="1;1;1;0" keyTimes="0;0.35;0.95;1" dur="7s" repeatCount="indefinite"/>
        </circle>
      </g>
      <ellipse cx="384" cy="252" rx="70" ry="5" fill="#34d399" opacity="0.1">
        <animate attributeName="opacity" values="0.06;0.15;0.06" dur="3.4s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- ======== COFFEE ======== -->
    <g>
      <rect x="498" y="228" width="30" height="26" rx="4" fill="#1b2340" stroke="#233054" stroke-width="1.5"/>
      <path d="M528,234 q12,4 0,14" fill="none" stroke="#233054" stroke-width="3"/>
      <!-- steam -->
      <path d="M506,222 q4,-8 0,-14 q-4,-6 2,-12" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
        <animate attributeName="opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6" dur="3s" repeatCount="indefinite"/>
      </path>
      <path d="M517,222 q4,-8 0,-14 q-4,-6 2,-12" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
        <animate attributeName="opacity" values="0;0.7;0" dur="3s" begin="1.2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6" dur="3s" begin="1.2s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- ======== GPU RACK ======== -->
    <g>
      <rect x="620" y="226" width="240" height="92" rx="8" fill="#0b1224" stroke="#233054" stroke-width="2"/>
      <text x="632" y="243" class="mono" font-size="9" fill="#475569" letter-spacing="2">TRAINING RIG</text>
      <!-- 3 GPU slots -->
      <g>
        <!-- slot template rows at y 250, 272, 294 -->
        <g transform="translate(632,250)">
          <rect width="216" height="16" rx="4" fill="#080b17" stroke="#1b2340"/>
          <text x="8" y="11" class="mono" font-size="8" fill="#64748b">GPU-0</text>
          <circle cx="150" cy="8" r="3" fill="#34d399"><animate attributeName="opacity" values="1;0.2;1" dur="0.9s" repeatCount="indefinite"/></circle>
          <circle cx="162" cy="8" r="3" fill="#fbbf24"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.3s" repeatCount="indefinite"/></circle>
          <circle cx="174" cy="8" r="3" fill="#22d3ee"><animate attributeName="opacity" values="1;0.3;1" dur="0.7s" begin="0.3s" repeatCount="indefinite"/></circle>
          <!-- fan -->
          <g transform="translate(198,8)">
            <circle r="6.5" fill="none" stroke="#233054" stroke-width="1"/>
            <g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="0.8s" repeatCount="indefinite"/>
              <line x1="-5" y1="0" x2="5" y2="0" stroke="#475569" stroke-width="1.5"/>
              <line x1="0" y1="-5" x2="0" y2="5" stroke="#475569" stroke-width="1.5"/>
            </g>
          </g>
        </g>
        <g transform="translate(632,272)">
          <rect width="216" height="16" rx="4" fill="#080b17" stroke="#1b2340"/>
          <text x="8" y="11" class="mono" font-size="8" fill="#64748b">GPU-1</text>
          <circle cx="150" cy="8" r="3" fill="#34d399"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.1s" repeatCount="indefinite"/></circle>
          <circle cx="162" cy="8" r="3" fill="#f472b6"><animate attributeName="opacity" values="1;0.2;1" dur="0.8s" begin="0.2s" repeatCount="indefinite"/></circle>
          <circle cx="174" cy="8" r="3" fill="#22d3ee"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.4s" begin="0.5s" repeatCount="indefinite"/></circle>
          <g transform="translate(198,8)">
            <circle r="6.5" fill="none" stroke="#233054" stroke-width="1"/>
            <g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="0.6s" repeatCount="indefinite"/>
              <line x1="-5" y1="0" x2="5" y2="0" stroke="#475569" stroke-width="1.5"/>
              <line x1="0" y1="-5" x2="0" y2="5" stroke="#475569" stroke-width="1.5"/>
            </g>
          </g>
        </g>
        <g transform="translate(632,294)">
          <rect width="216" height="16" rx="4" fill="#080b17" stroke="#1b2340"/>
          <text x="8" y="11" class="mono" font-size="8" fill="#64748b">GPU-2</text>
          <circle cx="150" cy="8" r="3" fill="#fbbf24"><animate attributeName="opacity" values="1;0.3;1" dur="1s" begin="0.4s" repeatCount="indefinite"/></circle>
          <circle cx="162" cy="8" r="3" fill="#34d399"><animate attributeName="opacity" values="0.2;1;0.2" dur="0.9s" repeatCount="indefinite"/></circle>
          <circle cx="174" cy="8" r="3" fill="#a78bfa"><animate attributeName="opacity" values="1;0.4;1" dur="1.2s" begin="0.6s" repeatCount="indefinite"/></circle>
          <g transform="translate(198,8)">
            <circle r="6.5" fill="none" stroke="#233054" stroke-width="1"/>
            <g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="0.7s" repeatCount="indefinite"/>
              <line x1="-5" y1="0" x2="5" y2="0" stroke="#475569" stroke-width="1.5"/>
              <line x1="0" y1="-5" x2="0" y2="5" stroke="#475569" stroke-width="1.5"/>
            </g>
          </g>
        </g>
      </g>
    </g>

    <!-- ======== SLEEPING CAT on rack ======== -->
    <g transform="translate(790,214)">
      <g>
        <animateTransform attributeName="transform" type="scale" values="1,1; 1,1.04; 1,1" dur="2.6s" repeatCount="indefinite" additive="sum"/>
        <ellipse cx="0" cy="4" rx="26" ry="10" fill="#1f2430" stroke="#0b0f1e" stroke-width="1"/>
        <circle cx="-20" cy="-2" r="9" fill="#1f2430" stroke="#0b0f1e" stroke-width="1"/>
        <path d="M-26,-8 L-24,-14 L-20,-9 Z" fill="#1f2430"/>
        <path d="M-17,-9 L-14,-14 L-11,-8 Z" fill="#1f2430"/>
        <path d="M24,4 q10,-2 8,-12" fill="none" stroke="#1f2430" stroke-width="4" stroke-linecap="round">
          <animate attributeName="d" values="M24,4 q10,-2 8,-12; M24,4 q12,-4 6,-14; M24,4 q10,-2 8,-12" dur="4s" repeatCount="indefinite"/>
        </path>
        <path d="M-25,-3 q2,2 4,0" fill="none" stroke="#0b0f1e" stroke-width="1"/>
      </g>
      <text x="-6" y="-20" class="mono" font-size="9" fill="#64748b" opacity="0">z
        <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0,0; 4,-8" dur="3s" repeatCount="indefinite"/>
      </text>
      <text x="2" y="-26" class="mono" font-size="11" fill="#64748b" opacity="0">z
        <animate attributeName="opacity" values="0;1;0" dur="3s" begin="1s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0,0; 4,-8" dur="3s" begin="1s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- ======== HOVER DRONE BUDDY ======== -->
    <g transform="translate(540,100)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="2.8s" repeatCount="indefinite"/>
        <!-- rotor -->
        <line x1="-14" y1="-14" x2="14" y2="-14" stroke="#64748b" stroke-width="2" stroke-linecap="round">
          <animate attributeName="opacity" values="0.9;0.2;0.9" dur="0.2s" repeatCount="indefinite"/>
        </line>
        <line x1="0" y1="-14" x2="0" y2="-9" stroke="#475569" stroke-width="2"/>
        <!-- body -->
        <ellipse cx="0" cy="0" rx="16" ry="12" fill="#0b1224" stroke="#22d3ee" stroke-width="1.5"/>
        <!-- eye -->
        <circle cx="0" cy="0" r="5" fill="#22d3ee" filter="url(#lglow)">
          <animate attributeName="fill" values="#22d3ee;#a78bfa;#22d3ee" dur="4s" repeatCount="indefinite"/>
        </circle>
        <!-- scan beam sweeping the desk -->
        <path d="M0,10 L-34,96 L34,96 Z" fill="#22d3ee" opacity="0.08">
          <animate attributeName="opacity" values="0.03;0.12;0.03" dur="2.8s" repeatCount="indefinite"/>
        </path>
        <!-- tiny status blink -->
        <circle cx="10" cy="-6" r="1.8" fill="#34d399">
          <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>

    <!-- ======== dust particles ======== -->
    <g fill="#64748b">
      <circle r="1.4" opacity="0.5"><animateMotion dur="11s" repeatCount="indefinite" path="M80,340 Q240,180 420,120 Q560,80 640,40"/><animate attributeName="opacity" values="0;0.5;0" dur="11s" repeatCount="indefinite"/></circle>
      <circle r="1.2" opacity="0.4"><animateMotion dur="14s" begin="3s" repeatCount="indefinite" path="M760,350 Q600,240 480,180 Q360,130 300,90"/><animate attributeName="opacity" values="0;0.4;0" dur="14s" begin="3s" repeatCount="indefinite"/></circle>
      <circle r="1" opacity="0.4"><animateMotion dur="12s" begin="6s" repeatCount="indefinite" path="M450,350 Q470,220 430,120"/><animate attributeName="opacity" values="0;0.4;0" dur="12s" begin="6s" repeatCount="indefinite"/></circle>
    </g>

    <!-- caption -->
    <text x="450" y="346" class="mono" font-size="10" fill="#475569" text-anchor="middle">// the lab never sleeps — only the cat does</text>
  </g>
</svg>
