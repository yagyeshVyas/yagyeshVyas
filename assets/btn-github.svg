<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" width="280" height="120" role="img" aria-label="GitHub">
  <defs>
    <linearGradient id="ghG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/><stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="ghF" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ghShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e2e8f0" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="ghClip"><rect width="280" height="120" rx="12"/></clipPath>
  </defs>
  <style>@media (prefers-reduced-motion: reduce){animate{display:none!important}*{opacity:1!important}}</style>
  <rect width="280" height="120" rx="12" fill="#0b1224" stroke="#1b2340" stroke-width="1"/>
  <rect x="0" y="0" width="280" height="3" rx="1.5" fill="url(#ghG)"/>
  <g transform="translate(20,20)" filter="url(#ghF)">
    <circle cx="20" cy="20" r="18" fill="#0b0f1e" stroke="#e2e8f0" stroke-width="1.5"/>
    <path d="M12 22a8 8 0 0 0 16 0c0-3.8-2.6-7-6.2-8 .2.4.3.9.3 1.4 0 1.6-.6 3-1.7 4.1.3.2.6.4 1 .4 1.2.8 2 2.2 2 3.8 0 .8-.2 1.5-.5 2.2.8-.2 1.5-.6 2.1-1.1-.4 1.4-1.6 2.5-3 2.8-.3 1.2-1.4 2-2.7 2-.6 0-1.2-.2-1.6-.5-.5.3-1.1.5-1.7.5-1.4 0-2.5-.9-2.8-2.1-1.5-.3-2.6-1.5-3-2.9.6.5 1.3.9 2.1 1.1-.3-.7-.5-1.4-.5-2.2 0-1.6.8-3 2-3.8-1.1-1.1-1.7-2.5-1.7-4.1 0-.5.1-1 .3-1.4-1.6.9-2.8 2.4-3.3 4.2Z" fill="#e2e8f0" transform="scale(0.7) translate(5,3)"/>
  </g>
  <text x="66" y="36" font-family="Segoe UI,Inter,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">GitHub</text>
  <text x="66" y="54" font-family="JetBrains Mono,monospace" font-size="11" fill="#64748b">@yagyeshVyas</text>
  <line x1="20" y1="66" x2="260" y2="66" stroke="#1b2340" stroke-width="0.8"/>
  <text x="20" y="86" font-family="JetBrains Mono,monospace" font-size="10" fill="#94a3b8">10 repos</text>
  <text x="100" y="86" font-family="JetBrains Mono,monospace" font-size="10" fill="#fbbf24">★ 118</text>
  <text x="160" y="86" font-family="JetBrains Mono,monospace" font-size="10" fill="#a78bfa">⑂ 18</text>
  <text x="250" y="86" font-family="JetBrains Mono,monospace" font-size="14" fill="#22d3ee" text-anchor="end">→
    <animateTransform attributeName="transform" type="translate" values="0,0; 5,0; 0,0" dur="1.6s" repeatCount="indefinite"/>
  </text>
  <g clip-path="url(#ghClip)">
    <rect x="-80" y="0" width="70" height="120" fill="url(#ghShine)" transform="skewX(-18)">
      <animate attributeName="x" values="-80;340" dur="3.5s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect width="280" height="120" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0;0.4;0" dur="4s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
</svg>
