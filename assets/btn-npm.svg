<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" width="280" height="120" role="img" aria-label="npm">
  <defs>
    <linearGradient id="npmG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6"/><stop offset="100%" stop-color="#cb3837"/>
    </linearGradient>
    <filter id="npmF" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
         <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="npmShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f472b6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="npmClip"><rect width="280" height="120" rx="12"/></clipPath>
  </defs>
  <style>@media (prefers-reduced-motion: reduce){animate{display:none!important}*{opacity:1!important}}</style>
  <rect width="280" height="120" rx="12" fill="#0b1224" stroke="#1b2340" stroke-width="1"/>
  <rect x="0" y="0" width="280" height="3" rx="1.5" fill="url(#npmG)"/>
  <g transform="translate(20,20)" filter="url(#npmF)">
    <rect x="6" y="6" width="28" height="28" rx="4" fill="#0b0f1e" stroke="#f472b6" stroke-width="1.5"/>
    <rect x="12" y="12" width="5" height="16" fill="#f472b6"/>
    <rect x="19" y="12" width="5" height="16" fill="#f472b6" opacity="0.7"/>
    <rect x="26" y="12" width="5" height="10" fill="#f472b6" opacity="0.5"/>
  </g>
  <text x="66" y="36" font-family="Segoe UI,Inter,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">npm</text>
  <text x="66" y="54" font-family="JetBrains Mono,monospace" font-size="11" fill="#64748b">~yagyeshvyas</text>
  <line x1="20" y1="66" x2="260" y2="66" stroke="#1b2340" stroke-width="0.8"/>
  <text x="20" y="86" font-family="JetBrains Mono,monospace" font-size="10" fill="#94a3b8">@yagyeshvyas/vibeguard</text>
  <text x="250" y="86" font-family="JetBrains Mono,monospace" font-size="14" fill="#f472b6" text-anchor="end">→
    <animateTransform attributeName="transform" type="translate" values="0,0; 5,0; 0,0" dur="1.6s" begin="1s" repeatCount="indefinite"/>
  </text>
  <g clip-path="url(#npmClip)">
    <rect x="-80" y="0" width="70" height="120" fill="url(#npmShine)" transform="skewX(-18)">
      <animate attributeName="x" values="-80;340" dur="3.5s" begin="2.4s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect width="280" height="120" rx="12" fill="none" stroke="#f472b6" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0;0.4;0" dur="4s" begin="1.8s" repeatCount="indefinite"/>
  </rect>
</svg>
