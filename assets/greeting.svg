<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 230" width="100%" height="auto" role="img" aria-label="Namaste! Welcome to my profile">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05060f"/>
      <stop offset="100%" stop-color="#0d0a1f"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gnam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#a78bfa;#f472b6;#22d3ee" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#f472b6">
        <animate attributeName="stop-color" values="#f472b6;#22d3ee;#a78bfa;#f472b6" dur="7s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="gglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="gframe"><rect width="900" height="230" rx="16"/></clipPath>
  </defs>

  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform, animateMotion { display: none !important; }
      * { opacity: 1 !important; }
    }
    .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
    .sans { font-family: 'Segoe UI', Inter, ui-sans-serif, system-ui, sans-serif; }
  </style>

  <g clip-path="url(#gframe)">
    <rect width="900" height="230" fill="url(#gbg)"/>
    <rect width="900" height="230" rx="16" fill="none" stroke="#1b2340" stroke-width="1.5"/>

    <!-- speed lines background -->
    <g stroke="#233054" stroke-width="1" opacity="0.6">
      <line x1="700" y1="20"  x2="900" y2="20"><animate attributeName="x1" values="900;620;900" dur="3s" repeatCount="indefinite"/></line>
      <line x1="740" y1="60"  x2="900" y2="60"><animate attributeName="x1" values="900;700;900" dur="2.4s" begin="0.5s" repeatCount="indefinite"/></line>
      <line x1="760" y1="180" x2="900" y2="180"><animate attributeName="x1" values="900;680;900" dur="2.8s" begin="1s" repeatCount="indefinite"/></line>
      <line x1="720" y1="210" x2="900" y2="210"><animate attributeName="x1" values="900;650;900" dur="3.2s" begin="0.2s" repeatCount="indefinite"/></line>
    </g>

    <!-- ================= CHARACTER (original anime-style warrior) ================= -->
    <g transform="translate(118,118)">
      <!-- pulsing power aura -->
      <ellipse cx="0" cy="8" rx="86" ry="100" fill="url(#aura)">
        <animate attributeName="rx" values="78;92;78" dur="1.6s" repeatCount="indefinite"/>
        <animate attributeName="ry" values="92;108;92" dur="1.6s" repeatCount="indefinite"/>
      </ellipse>
      <!-- aura flames -->
      <g fill="#fbbf24" opacity="0.5">
        <path d="M-62,40 Q-70,10 -58,-20 Q-54,10 -50,30 Z"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="0.9s" repeatCount="indefinite"/></path>
        <path d="M62,40 Q70,8 58,-22 Q54,8 50,30 Z"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="0.9s" repeatCount="indefinite"/></path>
      </g>

      <!-- rising energy particles -->
      <g fill="#fbbf24" filter="url(#gglow)">
        <circle r="2.5"><animateMotion dur="2.2s" repeatCount="indefinite" path="M-52,60 Q-58,10 -50,-55"/><animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite"/></circle>
        <circle r="2"><animateMotion dur="2.6s" begin="0.7s" repeatCount="indefinite" path="M54,60 Q60,5 50,-58"/><animate attributeName="opacity" values="0;1;0" dur="2.6s" begin="0.7s" repeatCount="indefinite"/></circle>
        <circle r="1.8" fill="#22d3ee"><animateMotion dur="2s" begin="1.2s" repeatCount="indefinite" path="M0,70 Q6,20 -4,-62"/><animate attributeName="opacity" values="0;1;0" dur="2s" begin="1.2s" repeatCount="indefinite"/></circle>
      </g>

      <!-- gentle float -->
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="3s" repeatCount="indefinite"/>

        <!-- spiky hair — powers up black → gold -->
        <path d="M-30,-38 L-40,-64 L-24,-52 L-18,-78 L-8,-56 L0,-84 L8,-56 L18,-78 L24,-52 L40,-64 L30,-38 Q0,-52 -30,-38 Z" stroke="#0b0f1e" stroke-width="1.5">
          <animate attributeName="fill" values="#1f2430;#1f2430;#fbbf24;#fbbf24;#1f2430" keyTimes="0;0.35;0.5;0.85;1" dur="6s" repeatCount="indefinite"/>
        </path>

        <!-- head -->
        <circle cx="0" cy="-26" r="21" fill="#ffd9b3" stroke="#0b0f1e" stroke-width="1.5"/>
        <!-- happy closed eyes ^ ^ -->
        <path d="M-12,-28 Q-8,-33 -4,-28" fill="none" stroke="#0b0f1e" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M4,-28 Q8,-33 12,-28" fill="none" stroke="#0b0f1e" stroke-width="2.2" stroke-linecap="round"/>
        <!-- smile -->
        <path d="M-7,-17 Q0,-11 7,-17" fill="none" stroke="#0b0f1e" stroke-width="2" stroke-linecap="round"/>
        <!-- blush -->
        <circle cx="-14" cy="-19" r="3" fill="#f472b6" opacity="0.45"/>
        <circle cx="14" cy="-19" r="3" fill="#f472b6" opacity="0.45"/>

        <!-- torso: orange gi -->
        <path d="M-26,-4 Q0,-12 26,-4 L30,46 Q0,54 -30,46 Z" fill="#f97316" stroke="#0b0f1e" stroke-width="1.5"/>
        <!-- inner shirt -->
        <path d="M-10,-6 L0,6 L10,-6 Q0,-10 -10,-6 Z" fill="#1d4ed8" stroke="#0b0f1e" stroke-width="1.2"/>
        <!-- belt -->
        <rect x="-28" y="24" width="56" height="8" rx="3" fill="#1d4ed8" stroke="#0b0f1e" stroke-width="1.2"/>

        <!-- arms in namaste -->
        <path d="M-26,0 Q-34,16 -14,24 L-4,16 Z" fill="#f97316" stroke="#0b0f1e" stroke-width="1.5"/>
        <path d="M26,0 Q34,16 14,24 L4,16 Z" fill="#f97316" stroke="#0b0f1e" stroke-width="1.5"/>
        <!-- joined palms -->
        <path d="M-5,6 Q0,0 5,6 L4,26 Q0,30 -4,26 Z" fill="#ffd9b3" stroke="#0b0f1e" stroke-width="1.5"/>
      </g>
    </g>

    <!-- ================= SPEECH BUBBLE ================= -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.4s" fill="freeze"/>
      <path d="M258,52 h250 a14,14 0 0 1 14,14 v46 a14,14 0 0 1 -14,14 h-236 l-24,20 6,-20 a14,14 0 0 1 -10,-14 v-46 a14,14 0 0 1 14,-14 Z"
            fill="#0b1224" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="278" y="88" class="sans" font-size="24" font-weight="800" fill="#e2e8f0">
        <tspan>N</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="0.7s"/>a</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="0.85s"/>m</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="1.0s"/>a</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="1.15s"/>s</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="1.3s"/>t</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="1.45s"/>e</tspan><tspan opacity="0"><set attributeName="opacity" to="1" begin="1.6s"/>!</tspan>
        <tspan opacity="0" font-size="22"><set attributeName="opacity" to="1" begin="1.8s"/> 🙏</tspan>
      </text>
      <text x="278" y="112" class="sans" font-size="13" fill="#94a3b8" opacity="0">
        Welcome, traveler — glad you found my corner of GitHub.
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2s" fill="freeze"/>
      </text>
    </g>

    <!-- ================= नमस्ते shimmer ================= -->
    <text x="720" y="112" class="sans" font-size="52" font-weight="800" fill="url(#gnam)" text-anchor="middle" opacity="0">
      नमस्ते
      <animate attributeName="opacity" values="0;1" dur="1s" begin="0.8s" fill="freeze"/>
    </text>
    <text x="720" y="140" class="mono" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="3" opacity="0">
      NAMASTE
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="1.4s" fill="freeze"/>
    </text>

    <!-- power level joke -->
    <g class="mono" font-size="11" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="2.4s" fill="freeze"/>
      <text x="258" y="168" fill="#475569">energy level:</text>
      <rect x="352" y="158" width="180" height="10" rx="5" fill="#0b1224" stroke="#1b2340" stroke-width="1"/>
      <rect x="352" y="158" width="0" height="10" rx="5" fill="#fbbf24">
        <animate attributeName="width" values="0;180" dur="1.4s" begin="2.6s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1"/>
      </rect>
      <text x="542" y="168" fill="#fbbf24" opacity="0">MAX
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4s" fill="freeze"/>
        <animate attributeName="opacity" values="1;0.4;1" dur="1s" begin="4.4s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- bottom shimmer -->
    <rect x="0" y="226" width="900" height="4" fill="url(#gnam)" opacity="0.7"/>
  </g>
</svg>
