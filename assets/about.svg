<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="100%" height="auto" role="img" aria-label="About Yagyesh">
  <defs>
    <linearGradient id="abG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1e"/><stop offset="100%" stop-color="#0b1224"/>
    </linearGradient>
    <linearGradient id="abLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="avatarG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="50%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="avatarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="abFrame"><rect width="900" height="280" rx="14"/></clipPath>
    <clipPath id="avatarClip"><circle cx="48" cy="48" r="42"/></clipPath>
  </defs>
  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform { display: none !important; }
      * { opacity: 1 !important; }
    }
    .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
    .sans { font-family: "Segoe UI", Inter, ui-sans-serif, system-ui, sans-serif; }
  </style>

  <g clip-path="url(#abFrame)">
    <rect width="900" height="280" fill="url(#abG)"/>
    <rect width="900" height="280" rx="14" fill="none" stroke="#1b2340" stroke-width="1.5"/>

    <!-- Left column: identity -->
    <g transform="translate(24,24)">

      <!-- ============ ANIMATED AVATAR ============ -->
      <!-- Glow background -->
      <circle cx="48" cy="48" r="60" fill="url(#avatarGlow)">
        <animate attributeName="r" values="55;65;55" dur="3s" repeatCount="indefinite"/>
      </circle>

      <!-- Outer rotating gradient ring -->
      <circle cx="48" cy="48" r="49" fill="none" stroke="url(#avatarG)" stroke-width="3" stroke-linecap="round" stroke-dasharray="60 240">
        <animateTransform attributeName="transform" type="rotate" from="0 48 48" to="360 48 48" dur="4s" repeatCount="indefinite"/>
      </circle>

      <!-- Inner counter-rotating dashed ring -->
      <circle cx="48" cy="48" r="44" fill="none" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="3 8" opacity="0.5">
        <animateTransform attributeName="transform" type="rotate" from="360 48 48" to="0 48 48" dur="8s" repeatCount="indefinite"/>
      </circle>

      <!-- Avatar circle background -->
      <circle cx="48" cy="48" r="42" fill="#0b1224" stroke="#a78bfa" stroke-width="1.5"/>

      <!-- Animated neural pattern inside avatar -->
      <g clip-path="url(#avatarClip)" opacity="0.6">
        <circle cx="28" cy="35" r="2" fill="#22d3ee"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
        <circle cx="48" cy="28" r="2" fill="#a78bfa"><animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/></circle>
        <circle cx="66" cy="38" r="2" fill="#f472b6"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/></circle>
        <circle cx="32" cy="58" r="2" fill="#34d399"><animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/></circle>
        <circle cx="62" cy="60" r="2" fill="#fbbf24"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
        <circle cx="48" cy="68" r="2" fill="#22d3ee"><animate attributeName="opacity" values="1;0.3;1" dur="2.1s" repeatCount="indefinite"/></circle>
        <line x1="28" y1="35" x2="48" y2="28" stroke="#22d3ee" stroke-width="0.5" opacity="0.5"/>
        <line x1="48" y1="28" x2="66" y2="38" stroke="#a78bfa" stroke-width="0.5" opacity="0.5"/>
        <line x1="28" y1="35" x2="32" y2="58" stroke="#22d3ee" stroke-width="0.5" opacity="0.4"/>
        <line x1="66" y1="38" x2="62" y2="60" stroke="#f472b6" stroke-width="0.5" opacity="0.4"/>
        <line x1="32" y1="58" x2="48" y2="68" stroke="#34d399" stroke-width="0.5" opacity="0.4"/>
        <line x1="62" y1="60" x2="48" y2="68" stroke="#fbbf24" stroke-width="0.5" opacity="0.4"/>
        <line x1="32" y1="58" x2="62" y2="60" stroke="#34d399" stroke-width="0.4" opacity="0.3"/>
        <circle r="1.5" fill="#fff" opacity="0.8">
          <animateMotion dur="3s" repeatCount="indefinite" path="M28,35 L48,28 L66,38 L62,60 L48,68 L32,58 Z"/>
        </circle>
      </g>

      <!-- YV initials on top -->
      <text x="48" y="56" class="sans" font-size="22" font-weight="800" fill="#e2e8f0" text-anchor="middle" opacity="0.9">YV</text>

      <!-- Orbiting particles -->
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0 48 48" to="360 48 48" dur="6s" repeatCount="indefinite"/>
        <circle cx="48" cy="3" r="2.5" fill="#22d3ee" opacity="0.9"/>
      </g>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="120 48 48" to="480 48 48" dur="6s" repeatCount="indefinite"/>
        <circle cx="48" cy="3" r="2" fill="#f472b6" opacity="0.8"/>
      </g>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="240 48 48" to="600 48 48" dur="6s" repeatCount="indefinite"/>
        <circle cx="48" cy="3" r="2" fill="#fbbf24" opacity="0.7"/>
      </g>

      <!-- Name + title -->
      <text x="0" y="130" class="sans" font-size="22" font-weight="700" fill="#e2e8f0">Yagyesh Vyas</text>
      <text x="0" y="152" class="mono" font-size="12" fill="#22d3ee" letter-spacing="1">AI / ML ENGINEER</text>

      <!-- Location -->
      <text x="0" y="184" class="sans" font-size="12" fill="#64748b">San Francisco Bay Area</text>

      <!-- Available dot -->
      <circle cx="6" cy="202" r="3.5" fill="#34d399">
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="16" y="206" class="sans" font-size="11" fill="#34d399">Available for full-time &amp; consulting</text>

      <!-- Quick tags -->
      <g transform="translate(0,224)" class="mono" font-size="10">
        <rect x="0" y="0" width="54" height="20" rx="10" fill="#0b0f1e" stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.4"/>
        <text x="27" y="14" fill="#22d3ee" text-anchor="middle">LLMs</text>
        <rect x="62" y="0" width="48" height="20" rx="10" fill="#0b0f1e" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.4"/>
        <text x="86" y="14" fill="#a78bfa" text-anchor="middle">RAG</text>
        <rect x="118" y="0" width="54" height="20" rx="10" fill="#0b0f1e" stroke="#f472b6" stroke-width="0.8" stroke-opacity="0.4"/>
        <text x="145" y="14" fill="#f472b6" text-anchor="middle">LoRA</text>
      </g>
    </g>

    <!-- Divider -->
    <line x1="220" y1="24" x2="220" y2="256" stroke="#1b2340" stroke-width="1"/>

    <!-- Right column: personal story -->
    <g transform="translate(240,24)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.3s" fill="freeze"/>

      <text x="0" y="18" class="mono" font-size="11" fill="#f472b6" font-weight="600" letter-spacing="2">WHO I AM</text>
      <rect x="0" y="26" width="636" height="1" fill="#1b2340"/>

      <text x="0" y="52" class="sans" font-size="14" fill="#e2e8f0">I build AI systems that run without cloud bills, API keys, or</text>
      <text x="0" y="72" class="sans" font-size="14" fill="#e2e8f0">data leaving your machine. My work lives at the intersection</text>
      <text x="0" y="92" class="sans" font-size="14" fill="#e2e8f0">of practical ML engineering and real-world deployment.</text>

      <text x="0" y="128" class="mono" font-size="11" fill="#22d3ee" font-weight="600" letter-spacing="2">WHAT DRIVES ME</text>
      <rect x="0" y="136" width="636" height="1" fill="#1b2340"/>

      <text x="0" y="160" class="sans" font-size="13" fill="#94a3b8"><tspan fill="#34d399" font-weight="600">&#9656;</tspan>  Making AI accessible — no API tax to use a model</text>
      <text x="0" y="180" class="sans" font-size="13" fill="#94a3b8"><tspan fill="#a78bfa" font-weight="600">&#9656;</tspan>  Security-first — AI code needs guardrails, not vibes</text>
      <text x="0" y="200" class="sans" font-size="13" fill="#94a3b8"><tspan fill="#22d3ee" font-weight="600">&#9656;</tspan>  Ship fast, measure always — if not measured, not done</text>
      <text x="0" y="220" class="sans" font-size="13" fill="#94a3b8"><tspan fill="#fbbf24" font-weight="600">&#9656;</tspan>  Open source by default — tools outlive the project</text>

    </g>

    <rect x="24" y="268" width="852" height="2" rx="1" fill="url(#abLine)" opacity="0.2"/>
  </g>
</svg>
