<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="100%" height="auto" role="img" aria-label="About Yagyesh">
  <defs>
    <linearGradient id="abG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1e"/><stop offset="100%" stop-color="#0b1224"/>
    </linearGradient>
    <linearGradient id="abLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="abFrame"><rect width="900" height="280" rx="14"/></clipPath>
  </defs>
  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform { display: none !important; }
      * { opacity: 1 !important; }
    }
    .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
    .sans { font-family: "Segoe UI", Inter, ui-sans-serif, system-ui, sans-serif; }
  </style>

  <g clip-path="url(#abFrame)">
    <rect width="900" height="280" fill="url(#abG)"/>
    <rect width="900" height="280" rx="14" fill="none" stroke="#1b2340" stroke-width="1.5"/>

    <!-- Left column: identity -->
    <g transform="translate(24,24)">
      <!-- Avatar circle -->
      <circle cx="48" cy="48" r="46" fill="#0b1224" stroke="#a78bfa" stroke-width="2"/>
      <circle cx="48" cy="48" r="46" fill="none" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.4">
        <animate attributeName="r" values="46;52;46" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0;0.4" dur="4s" repeatCount="indefinite"/>
      </circle>
      <text x="48" y="58" class="sans" font-size="32" font-weight="800" fill="#a78bfa" text-anchor="middle">YV</text>

      <!-- Name + title -->
      <text x="0" y="130" class="sans" font-size="22" font-weight="700" fill="#e2e8f0">Yagyesh Vyas</text>
      <text x="0" y="152" class="mono" font-size="12" fill="#22d3ee" letter-spacing="1">AI / ML ENGINEER</text>

      <!-- Location + availability -->
      <g transform="translate(0,170)">
        <text x="0" y="14" class="sans" font-size="12" fill="#64748b">📍 San Francisco Bay Area</text>
        <circle cx="6" cy="34" r="3.5" fill="#34d399">
          <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
        </circle>
        <text x="16" y="38" class="sans" font-size="12" fill="#34d399">Available for full-time &amp; consulting</text>
      </g>

      <!-- Quick tags -->
      <g transform="translate(0,210)" class="mono" font-size="10">
        <rect x="0" y="0" width="54" height="20" rx="10" fill="#0b0f1e" stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.4"/>
        <text x="27" y="14" fill="#22d3ee" text-anchor="middle">LLMs</text>
        <rect x="62" y="0" width="48" height="20" rx="10" fill="#0b0f1e" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.4"/>
        <text x="86" y="14" fill="#a78bfa" text-anchor="middle">RAG</text>
        <rect x="118" y="0" width="54" height="20" rx="10" fill="#0b0f1e" stroke="#f472b6" stroke-width="0.8" stroke-opacity="0.4"/>
        <text x="145" y="14" fill="#f472b6" text-anchor="middle">LoRA</text>
      </g>
    </g>

    <!-- Divider -->
    <line x1="220" y1="24" x2="220" y2="256" stroke="#1b2340" stroke-width="1"/>

    <!-- Right column: personal story -->
    <g transform="translate(240,24)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.3s" fill="freeze"/>

      <text x="0" y="20" class="mono" font-size="11" fill="#f472b6" font-weight="600" letter-spacing="2">WHO I AM</text>
      <rect x="0" y="28" width="636" height="1" fill="#1b2340"/>

      <text x="0" y="56" class="sans" font-size="14" fill="#e2e8f0">
        <tspan x="0" dy="0">I build AI systems that run without cloud bills, API keys, or</tspan>
        <tspan x="0" dy="20">data leaving your machine. My work lives at the intersection</tspan>
        <tspan x="0" dy="20">of practical ML engineering and real-world deployment.</tspan>
      </text>

      <text x="0" y="140" class="mono" font-size="11" fill="#22d3ee" font-weight="600" letter-spacing="2">WHAT DRIVES ME</text>
      <rect x="0" y="148" width="636" height="1" fill="#1b2340"/>

      <g class="sans" font-size="13" fill="#94a3b8">
        <text x="0" y="170"><tspan fill="#34d399">→</tspan>  Making AI accessible — no $20/month API tax to use a model</text>
        <text x="0" y="190"><tspan fill="#a78bfa">→</tspan>  Security-first thinking — AI code needs guardrails, not vibes</text>
        <text x="0" y="210"><tspan fill="#22d3ee">→</tspan>  Ship fast, measure always — if it's not measured, it's not done</text>
        <text x="0" y="230"><tspan fill="#fbbf24">→</tspan>  Open source by default — tools should outlive the project</text>
      </g>

      <!-- Signature metric -->
      <g transform="translate(0,248)">
        <text x="0" y="0" class="mono" font-size="20" font-weight="800" fill="#a78bfa">2,900+</text>
        <text x="84" y="0" class="sans" font-size="11" fill="#64748b">GitHub contributions · building in public, every day</text>
      </g>
    </g>

    <!-- Bottom line -->
    <rect x="24" y="268" width="852" height="2" rx="1" fill="url(#abLine)" opacity="0.2"/>
  </g>
</svg>
