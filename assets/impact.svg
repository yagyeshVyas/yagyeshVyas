<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="100%" height="auto" role="img" aria-label="Real impact — numbers from shipped projects">
  <defs>
    <linearGradient id="imG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1e"/><stop offset="100%" stop-color="#0b1224"/>
    </linearGradient>
    <linearGradient id="imLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <filter id="imGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="imFrame"><rect width="900" height="200" rx="14"/></clipPath>
  </defs>
  <style>
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform { display: none !important; }
      * { opacity: 1 !important; animation: none !important; }
    }
    .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
    .sans { font-family: "Segoe UI", Inter, ui-sans-serif, system-ui, sans-serif; }
    .imb0 { animation: imp 4s ease-in-out infinite; }
    .imb1 { animation: imp 4s ease-in-out infinite 1s; }
    .imb2 { animation: imp 4s ease-in-out infinite 2s; }
    .imb3 { animation: imp 4s ease-in-out infinite 3s; }
    @keyframes imp { 0%,100% { stroke-opacity: .3; } 50% { stroke-opacity: .9; } }
  </style>

  <g clip-path="url(#imFrame)">
    <rect width="900" height="200" fill="url(#imG)"/>
    <rect width="900" height="200" rx="14" fill="none" stroke="#1b2340" stroke-width="1.5"/>

    <!-- Header -->
    <text x="24" y="36" class="mono" font-size="13" fill="#fbbf24" font-weight="600" letter-spacing="2">IMPACT</text>
    <text x="100" y="36" class="mono" font-size="10" fill="#475569">// numbers from things I've shipped, not resumes</text>
    <rect x="24" y="46" width="852" height="1" fill="#1b2340"/>
    <rect x="24" y="45.5" width="180" height="2" rx="1" fill="url(#imLine)">
      <animateTransform attributeName="transform" type="translate" values="-180,0; 900,0" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- 4 metric cards -->

    <!-- Stars -->
    <g transform="translate(24,60)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.2s" fill="freeze"/>
      <rect width="205" height="120" rx="10" fill="#0b1224" class="imb0" stroke="#22d3ee" stroke-width="1"/>
      <rect x="0" y="0" width="205" height="3" rx="1.5" fill="#22d3ee"/>
      <text x="20" y="36" font-size="24">⭐
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="3s" repeatCount="indefinite"/>
      </text>
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.5s" fill="freeze"/>
        <animateTransform attributeName="transform" type="scale" values="0.6;1.08;1" keyTimes="0;0.7;1" dur="0.6s" begin="0.5s" fill="freeze" additive="sum"/>
        <text x="20" y="76" class="mono" font-size="36" font-weight="800" fill="#22d3ee" filter="url(#imGlow)">118</text>
      </g>
      <text x="20" y="96" class="sans" font-size="11" fill="#64748b">GitHub stars earned</text>
      <text x="20" y="110" class="mono" font-size="9" fill="#475569">across all public repos</text>
      <circle cx="185" cy="100" r="3" fill="#22d3ee">
        <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Forks -->
    <g transform="translate(239,60)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.4s" fill="freeze"/>
      <rect width="205" height="120" rx="10" fill="#0b1224" class="imb1" stroke="#a78bfa" stroke-width="1"/>
      <rect x="0" y="0" width="205" height="3" rx="1.5" fill="#a78bfa"/>
      <text x="20" y="36" font-size="24">⑂
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="3s" begin="0.7s" repeatCount="indefinite"/>
      </text>
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.7s" fill="freeze"/>
        <animateTransform attributeName="transform" type="scale" values="0.6;1.08;1" keyTimes="0;0.7;1" dur="0.6s" begin="0.7s" fill="freeze" additive="sum"/>
        <text x="20" y="76" class="mono" font-size="36" font-weight="800" fill="#a78bfa" filter="url(#imGlow)">18</text>
      </g>
      <text x="20" y="96" class="sans" font-size="11" fill="#64748b">Repository forks</text>
      <text x="20" y="110" class="mono" font-size="9" fill="#475569">people building on my work</text>
      <circle cx="185" cy="100" r="3" fill="#a78bfa">
        <animate attributeName="opacity" values="1;0.2;1" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Rules shipped -->
    <g transform="translate(454,60)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.6s" fill="freeze"/>
      <rect width="205" height="120" rx="10" fill="#0b1224" class="imb2" stroke="#f472b6" stroke-width="1"/>
      <rect x="0" y="0" width="205" height="3" rx="1.5" fill="#f472b6"/>
      <text x="20" y="36" font-size="24">🛡️
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="3s" begin="1.4s" repeatCount="indefinite"/>
      </text>
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.9s" fill="freeze"/>
        <animateTransform attributeName="transform" type="scale" values="0.6;1.08;1" keyTimes="0;0.7;1" dur="0.6s" begin="0.9s" fill="freeze" additive="sum"/>
        <text x="20" y="76" class="mono" font-size="36" font-weight="800" fill="#f472b6" filter="url(#imGlow)">699</text>
      </g>
      <text x="20" y="96" class="sans" font-size="11" fill="#64748b">Security rules shipped</text>
      <text x="20" y="110" class="mono" font-size="9" fill="#475569">in VibeGuard — 76 MCP tools</text>
      <circle cx="185" cy="100" r="3" fill="#f472b6">
        <animate attributeName="opacity" values="1;0.2;1" dur="2s" begin="1s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Repos -->
    <g transform="translate(669,60)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.8s" fill="freeze"/>
      <rect width="205" height="120" rx="10" fill="#0b1224" class="imb3" stroke="#34d399" stroke-width="1"/>
      <rect x="0" y="0" width="205" height="3" rx="1.5" fill="#34d399"/>
      <text x="20" y="36" font-size="24">📦
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="3s" begin="2.1s" repeatCount="indefinite"/>
      </text>
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.1s" fill="freeze"/>
        <animateTransform attributeName="transform" type="scale" values="0.6;1.08;1" keyTimes="0;0.7;1" dur="0.6s" begin="1.1s" fill="freeze" additive="sum"/>
        <text x="20" y="76" class="mono" font-size="36" font-weight="800" fill="#34d399" filter="url(#imGlow)">10</text>
      </g>
      <text x="20" y="96" class="sans" font-size="11" fill="#64748b">Public repositories</text>
      <text x="20" y="110" class="mono" font-size="9" fill="#475569">all open source, all built in public</text>
      <circle cx="185" cy="100" r="3" fill="#34d399">
        <animate attributeName="opacity" values="1;0.2;1" dur="2s" begin="1.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Bottom line -->
    <rect x="24" y="190" width="852" height="2" rx="1" fill="url(#imLine)" opacity="0.2"/>
  </g>
</svg>
