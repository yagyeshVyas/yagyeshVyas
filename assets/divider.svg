<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 24" width="900" height="24" role="img" aria-label="">
  <defs>
    <linearGradient id="dg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    @media (prefers-reduced-motion: reduce) { animate, animateTransform { display: none !important; } }
  </style>
  <line x1="0" y1="12" x2="900" y2="12" stroke="#1b2340" stroke-width="1"/>
  <rect x="0" y="11" width="300" height="2" rx="1" fill="url(#dg)">
    <animateTransform attributeName="transform" type="translate" values="-300,0; 900,0" dur="4s" repeatCount="indefinite"/>
  </rect>
  <circle cx="450" cy="12" r="4" fill="#0b0f1e" stroke="#a78bfa" stroke-width="1.5">
    <animate attributeName="r" values="4;5.5;4" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
